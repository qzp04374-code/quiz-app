<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ClassSYNC Offline</title>
  <meta name="theme-color" content="#0f172a" />
  <style>
    :root{
      --bg:#0f172a;
      --panel:#111827;
      --text:#f8fafc;
      --muted:#cbd5e1;
      --accent:#38bdf8;
      --danger:#f87171;
    }
    *{box-sizing:border-box}
    body{
      margin:0;
      min-height:100vh;
      display:grid;
      place-items:center;
      background:linear-gradient(180deg,#0f172a,#111827);
      color:var(--text);
      font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;
      padding:2rem;
    }
    .card{
      width:min(42rem,100%);
      background:rgba(17,24,39,.94);
      border:1px solid rgba(255,255,255,.08);
      border-radius:1.5rem;
      padding:2rem;
      box-shadow:0 20px 50px rgba(0,0,0,.35);
    }
    .badge{
      display:inline-block;
      padding:.45rem .9rem;
      border-radius:999px;
      background:rgba(248,113,113,.14);
      color:#fecaca;
      font-weight:800;
      margin-bottom:1rem;
    }
    h1{
      margin:0 0 1rem 0;
      font-size:clamp(1.8rem,3vw,2.5rem);
    }
    p{
      margin:.7rem 0;
      color:var(--muted);
      line-height:1.8;
    }
    a{
      display:inline-block;
      margin-top:1rem;
      text-decoration:none;
      color:#fff;
      background:var(--accent);
      padding:.9rem 1.2rem;
      border-radius:1rem;
      font-weight:800;
    }
  </style>
</head>
<body>
  <main class="card">
    <div class="badge">オフライン</div>
    <h1>ClassSYNC に接続できません</h1>
    <p>ネットワーク接続を確認してください。</p>
    <p>授業でリアルタイム同期を使うため、Firebase に接続できる状態が必要です。</p>
    <a href="./index.html?v=20260415">教員画面へ戻る</a>
  </main>
</body>
</html>
