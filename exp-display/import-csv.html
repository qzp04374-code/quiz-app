<body>

<h2>CSV → questions 投入</h2>

<div class="box">
  <strong>room</strong>：<span id="roomLabel"></span><br>
  <div class="hint">
    URLに <code>?room=kyoto-01</code> のように指定できます。
  </div>
</div>

<div class="box">
  <strong>① CSVファイルから読み込む</strong><br>
  <input type="file" id="fileInput" accept=".csv">
</div>

<div class="box">
  <strong>② CSVを直接貼り付ける</strong>
  <textarea id="csvInput" placeholder="CSVをここに貼り付けてください"></textarea>

  <div class="hint">
    ✅ 分岐を入れたい場合は列を追加：<br>
    ○×用：<code>branch_o</code>, <code>branch_x</code><br>
    5択用：<code>branch_a</code>〜<code>branch_e</code><br>
    例：<code>branch_a</code> に <code>Q10</code> を入れると、Aが多数決のとき次は Q10 になります。
  </div>
</div>

<!-- ボタン行 -->
<div style="display:flex; flex-wrap:wrap; gap:10px; margin-top:12px; align-items:center;">
  <button id="validateBtn" style="background:#6366f1;">① バリデーション＋プレビュー</button>
  <button id="exportNormalizedBtn" style="background:#374151;">CSVを保存（正規化）</button>
</div>

<!-- バリデーション結果 -->
<div id="validationBox" style="display:none;">
  <h3>⚠️ バリデーション結果</h3>
  <div id="validationList"></div>
</div>

<!-- プレビューセクション -->
<div id="previewSection" class="box" style="display:none;">
  <h3 style="margin:0 0 12px 0; font-size:16px;">📋 プレビュー確認（全問一覧）</h3>
  <div class="pv-summary" id="pvSummary"></div>
  <div class="pv-cards" id="pvCards" style="padding-right:4px;"></div>
  <div style="margin-top:16px; display:flex; gap:10px; flex-wrap:wrap;">
    <button id="importBtn" style="background:linear-gradient(135deg,#22c55e,#16a34a); font-size:15px; padding:14px 28px;">✅ Firebase に投入する</button>
    <button id="cancelPreviewBtn" style="background:#374151;">← 戻って修正</button>
  </div>

<div id="log"></div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getDatabase, ref, set } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

const firebaseConfig = {
  apiKey: "AIzaSyBke-wTU16skpbK8z80ddK04tE154dHERQ",
  databaseURL: "https://satosan-41eac-default-rtdb.asia-southeast1.firebasedatabase.app",
  projectId: "satosan-41eac"
};

const app = initializeApp(firebaseConfig);
const db  = getDatabase(app);

const room = new URLSearchParams(location.search).get("room") || "kyoto-01";
document.getElementById("roomLabel").textContent = room;

const logEl = document.getElementById("log");

function log(msg){
  logEl.textContent += msg + "\n";
}

function normalizeHeader(h){
  // 大文字小文字・ハイフン差・空白差を吸収
  return String(h ?? "")
    .trim()
    .toLowerCase()
    .replace(/\s+/g, "")
    .replace(/-/g, "_");
}

/**
 * RFC4180 “っぽい” CSV 行パーサ
 * - ダブルクォート内のカンマを許容
 * - "" を " として扱う
 */
function parseCSVLine(line){
  const out = [];
  let cur = "";
  let inQuotes = false;

  for (let i=0; i<line.length; i++){
    const ch = line[i];

    if (inQuotes){
      if (ch === '"'){
        // "" -> "
        if (line[i+1] === '"'){ cur += '"'; i++; }
        else inQuotes = false;
      }else{
        cur += ch;
      }
      continue;
    }

    if (ch === '"'){ inQuotes = true; continue; }
    if (ch === ","){ out.push(cur); cur = ""; continue; }
    cur += ch;
  }
  out.push(cur);
  return out;
}

// 追加：直近の parse 結果を保持
let lastParsedOut = null;

// 追加：CSVエスケープ（カンマ/改行/" 対応）
function csvEscape(v){
  const s = String(v ?? "");
  if (/[",\r\n]/.test(s)) return `"${s.replace(/"/g, '""')}"`;
  return s;
}

// 追加：out(questions) → ClassSync標準17列CSVに変換
function buildCanonicalCSVFromOut(out){
  const header = [
    "question_id","mode","question",
    "choiceA","choiceB","choiceC","choiceD","choiceE",
    "answer","explanation",
    "branch_o","branch_x","branch_a","branch_b","branch_c","branch_d","branch_e"
  ];

  const qids = Object.keys(out || {}).sort((a,b)=>{
  const na = parseInt(String(a).match(/^Q(\d+)/i)?.[1] || "999999", 10);
  const nb = parseInt(String(b).match(/^Q(\d+)/i)?.[1] || "999999", 10);
  if (na !== nb) return na - nb;
  // 同番号（枝番など）がある場合は文字列で安定化
  return String(a).localeCompare(String(b), "ja");
});
  const lines = [header.join(",")];

  for (const qid of qids){
    const q = out[qid] || {};
    const choices = q.choices || {};
    const branch  = q.branch  || {};

    const row = [
      qid,
      q.mode ?? "",
      q.question ?? "",
      choices.A ?? "",
      choices.B ?? "",
      choices.C ?? "",
      choices.D ?? "",
      choices.E ?? "",
      q.answer ?? "",
      q.explanation ?? "",
      branch.O ?? "",
      branch.X ?? "",
      branch.A ?? "",
      branch.B ?? "",
      branch.C ?? "",
      branch.D ?? "",
      branch.E ?? ""
    ];

    lines.push(row.map(csvEscape).join(","));
  }

  return lines.join("\r\n");
}

// 追加：CSVをダウンロード保存
function downloadText(filename, text){
  const blob = new Blob([text], { type: "text/csv;charset=utf-8" });
  const url = URL.createObjectURL(blob);
  const a = document.createElement("a");
  a.href = url;
  a.download = filename;
  document.body.appendChild(a);
  a.click();
  a.remove();
  URL.revokeObjectURL(url);
}
function stripBOM(s){
  return s.charCodeAt(0) === 0xFEFF ? s.slice(1) : s;
}

function firstIndex(headers, candidates){
  for (const c of candidates){
    const k = normalizeHeader(c);
    const i = headers.indexOf(k);
    if (i >= 0) return i;
  }
  return -1;
}

function getCell(cols, idx){
  if (idx < 0) return "";
  return String(cols[idx] ?? "").trim();
}

function pickChoiceValue(headers, cols, key){
  // key: "A".."E"
  const k = key.toUpperCase();
  const i = firstIndex(headers, [
    `choice${k}`, `choice_${k}`, `choice-${k}`,
    k, k.toLowerCase()
  ]);
  return getCell(cols, i);
}

function parseCSV(text){
  const rawLines = text.split(/\r?\n/);
  const lines = rawLines.map(l => l.trimEnd()).filter(l => l.trim() !== "");
  if (lines.length < 2) throw new Error("CSVの行数が足りません（ヘッダ+1行以上必要）");

  const headerLine = stripBOM(lines[0]);
  const headers = parseCSVLine(headerLine).map(normalizeHeader);

  const qidIdx = firstIndex(headers, ["question_id","question-id","qid","id"]);
  const qIdx   = firstIndex(headers, ["question","q"]);
  const ansIdx = firstIndex(headers, ["answer","ans"]);
  const expIdx = firstIndex(headers, ["explanation","exp","comment"]);
  const modeIdx= firstIndex(headers, ["mode","type"]);

  if (qidIdx < 0 || qIdx < 0){
    throw new Error("question_id（または qid）/ question（または q）列が見つかりません");
  }

  // branch列（任意）
  const bO = firstIndex(headers, ["branch_o","branch-o"]);
  const bX = firstIndex(headers, ["branch_x","branch-x"]);
  const bA = firstIndex(headers, ["branch_a","branch-a"]);
  const bB = firstIndex(headers, ["branch_b","branch-b"]);
  const bC = firstIndex(headers, ["branch_c","branch-c"]);
  const bD = firstIndex(headers, ["branch_d","branch-d"]);
  const bE = firstIndex(headers, ["branch_e","branch-e"]);

  const out = {};
  let count = 0;
  let branchCount = 0;

  for (let i=1; i<lines.length; i++){
    const cols = parseCSVLine(lines[i]);
    const qid = getCell(cols, qidIdx);
    if (!qid) continue;

    const mode = getCell(cols, modeIdx).toLowerCase(); // "ox" / "five" / "text" など
    const q = {
      question: getCell(cols, qIdx),
      answer: normalizeOXAnswer(getCell(cols, ansIdx), mode),
      explanation: getCell(cols, expIdx),
    };
    if (mode) q.mode = mode;

    // choices（five のときだけ作る）
if (mode === "five"){
  const choices = {};
  for (const k of ["A","B","C","D","E"]){
    const v = pickChoiceValue(headers, cols, k);
    if (v) choices[k] = v;
  }
  if (Object.keys(choices).length) q.choices = choices;
}

    // branch（入っているものだけ作る）
    const branch = {};
    const put = (key, idx) => {
      const v = getCell(cols, idx);
      if (v) branch[key] = v;
    };
    put("O", bO);
    put("X", bX);
    put("A", bA);
    put("B", bB);
    put("C", bC);
    put("D", bD);
    put("E", bE);

    if (Object.keys(branch).length){
      q.branch = branch;
      branchCount++;
    }

    out[qid] = q;
    count++;
  }

  lastParsedOut = out;
  return { out, count, branchCount };
}

// ===== OX解答の正規化（A→O, B→X, 〇/○→O, ×/✕→X） =====
function normalizeOXAnswer(ans, mode){
  if ((mode||"").toLowerCase() !== "ox") return ans;
  const a = String(ans||"").trim().toUpperCase();
  if (a === "A" || a === "〇" || a === "○") return "O";
  if (a === "B" || a === "×" || a === "✕") return "X";
  return ans; // O / X はそのまま、空欄もそのまま
}

// ===== バリデーション関数 =====
function validateOut(out, rawLines, headers, qidIdx, modeIdx, ansIdx){
  const errors = [];
  const warns  = [];
  const VALID_MODES = ["ox","five","text"];
  const VALID_OX    = ["O","X","o","x","A","B","a","b","〇","×","○","✕"];
  const VALID_FIVE  = ["A","B","C","D","E","a","b","c","d","e"];

  // 期待列数：ヘッダ行の列数
  const expectedCols = headers.length;

  for (let i=1; i<rawLines.length; i++){
    const line = rawLines[i];
    if (!line.trim()) continue;
    const cols = parseCSVLine(line);
    const lineNum = i + 1;
    const qid = getCell(cols, qidIdx) || `行${lineNum}`;

    // (1) 列数チェック
    if (cols.length !== expectedCols){
      errors.push({
        line: lineNum,
        qid,
        msg: `列数が違います（ヘッダ: ${expectedCols}列 / この行: ${cols.length}列）`,
        type:"error"
      });
    }

    // (2) question_id・question が空
    const qidVal  = getCell(cols, qidIdx);
    const qVal    = getCell(cols, firstIndex(headers,["question","q"]));
    if (!qidVal) errors.push({ line:lineNum, qid, msg:"question_id が空です", type:"error" });
    if (!qVal)   errors.push({ line:lineNum, qid, msg:"question（問題文）が空です", type:"error" });

    // (3) mode チェック
    const mode = getCell(cols, modeIdx).toLowerCase();
    if (!mode){
      warns.push({ line:lineNum, qid, msg:`mode が未入力です（ox / five / text のいずれかを推奨）`, type:"warn" });
    } else if (!VALID_MODES.includes(mode)){
      errors.push({ line:lineNum, qid, msg:`mode が不正です：「${mode}」（有効値: ox / five / text）`, type:"error" });
    }

    // (4) answer チェック
    // text モードは解答・解説とも空欄OK（模範解答は解説に書いてもよい）
    const ans = getCell(cols, ansIdx).toUpperCase();
    if (mode === "text"){
      // テキスト問題は answer 空欄 OK → チェックしない
    } else if (!ans){
      warns.push({ line:lineNum, qid, msg:`answer が空です`, type:"warn" });
    } else if (mode === "ox" && !VALID_OX.map(x=>x.toUpperCase()).includes(ans)){
      errors.push({ line:lineNum, qid, msg:`answer が不正です：「${ans}」（ox の場合は O/X/A/B/〇/×）`, type:"error" });
    } else if (mode === "five" && !VALID_FIVE.map(x=>x.toUpperCase()).includes(ans)){
      errors.push({ line:lineNum, qid, msg:`answer が不正です：「${ans}」（five の場合は A〜E）`, type:"error" });
    }

    // (5) five なのに選択肢が空
    if (mode === "five"){
      const missing = [];
      for (const k of ["A","B","C","D","E"]){
        const v = pickChoiceValue(headers, cols, k);
        if (!v) missing.push(k);
      }
      if (missing.length > 0){
        warns.push({ line:lineNum, qid, msg:`5択の選択肢が不足しています（空: ${missing.join(", ")}）`, type:"warn" });
      }
    }
  }
  return { errors, warns };
}

// ===== プレビュー状態 =====
let previewData = null; // { qids, out }

function renderPreviewAll(){
  if (!previewData) return;
  const { qids, out } = previewData;
  const cards = document.getElementById("pvCards");
  cards.innerHTML = "";

  for (const qid of qids){
    const q = out[qid] || {};
    const mode = (q.mode || "").toLowerCase();

    const badgeClass = mode === "ox" ? "badge-ox" : mode === "five" ? "badge-five" : "badge-text";
    const badgeLabel = mode === "ox" ? "○✕" : mode === "five" ? "5択" : mode === "text" ? "TEXT" : mode || "?";

    const choices = q.choices || {};
    const choiceHtml = Object.entries(choices).map(([k,v]) =>
      `<div class="pv-choice"><b>${k}.</b> ${esc(v)}</div>`
    ).join("");

    const ansLabel = q.answer
      ? `<div class="pv-answer">✅ 正解：${esc(q.answer)}</div>`
      : `<div class="pv-error">⚠️ answer が空</div>`;

    const expHtml = q.explanation
      ? `<div class="pv-explanation">💬 ${esc(q.explanation)}</div>` : "";

    const card = document.createElement("div");
    card.className = "pv-card";
    card.innerHTML = `
      <div class="pv-card-head">
        <span class="pv-badge ${badgeClass}">${badgeLabel}</span>
        <span class="pv-qid">${esc(qid)}</span>
      </div>
      <div class="pv-question">${esc(q.question || "（問題文なし）")}</div>
      ${choiceHtml ? `<div class="pv-choices">${choiceHtml}</div>` : ""}
      ${ansLabel}
      ${expHtml}
    `;
    cards.appendChild(card);
  }
}

function esc(s){
  return String(s ?? "")
    .replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");
}

// ===== ファイル読み込み =====
document.getElementById("fileInput").addEventListener("change", e=>{
  const file = e.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = () => {
    document.getElementById("csvInput").value = reader.result;
    logEl.textContent = "";
    log("CSVファイルを読み込みました");
  };
  reader.readAsText(file);
});

// ===== ① バリデーション＋プレビュー =====
document.getElementById("validateBtn").onclick = () => {
  logEl.textContent = "";
  document.getElementById("validationBox").style.display = "none";
  document.getElementById("previewSection").style.display = "none";

  try{
    const text = document.getElementById("csvInput").value.trim();
    if (!text) throw new Error("CSVが空です");

    // parse
    const { out, count, branchCount } = parseCSV(text);
    if (count <= 0) throw new Error("有効な行がありません（question_id が空など）");

    // バリデーション用にrawLinesとheadersを再取得
    const rawLines = text.split(/\r?\n/).map(l=>l.trimEnd()).filter(l=>l.trim()!=="");
    const headerLine = stripBOM(rawLines[0]);
    const headers = parseCSVLine(headerLine).map(normalizeHeader);
    const qidIdx  = firstIndex(headers, ["question_id","question-id","qid","id"]);
    const modeIdx = firstIndex(headers, ["mode","type"]);
    const ansIdx  = firstIndex(headers, ["answer","ans"]);

    const { errors, warns } = validateOut(out, rawLines, headers, qidIdx, modeIdx, ansIdx);

    // バリデーション結果表示
    const vBox  = document.getElementById("validationBox");
    const vList = document.getElementById("validationList");
    vList.innerHTML = "";

    if (errors.length === 0 && warns.length === 0){
      vBox.style.display = "block";
      vBox.style.background = "#0a1a0a";
      vBox.style.borderColor = "rgba(34,197,94,.35)";
      vList.innerHTML = `<div style="color:#86efac;font-weight:900;">✅ エラー・警告なし（${count}問すべて正常）</div>`;
    } else {
      vBox.style.display = "block";
      vBox.style.background = "";
      vBox.style.borderColor = "";

      const title = document.querySelector("#validationBox h3");
      title.textContent = `⚠️ バリデーション結果（エラー: ${errors.length}件 / 警告: ${warns.length}件）`;

      [...errors, ...warns].sort((a,b)=>a.line-b.line).forEach(item => {
        const div = document.createElement("div");
        div.className = item.type === "error" ? "err-row" : "warn-row";
        div.innerHTML = `<div class="err-line">${item.type === "error" ? "❌" : "⚠️"} 行 ${item.line}（${esc(item.qid)}）</div>
          <div class="err-detail">${esc(item.msg)}</div>`;
        vList.appendChild(div);
      });
    }

    // プレビュー表示（エラーがあっても表示する）
    const qids = Object.keys(out).sort((a,b)=>{
      const na = parseInt(String(a).match(/^Q(\d+)/i)?.[1]||"999999",10);
      const nb = parseInt(String(b).match(/^Q(\d+)/i)?.[1]||"999999",10);
      if (na!==nb) return na-nb;
      return String(a).localeCompare(String(b),"ja");
    });

    previewData = { qids, out };

    const pvSection = document.getElementById("previewSection");
    pvSection.style.display = "block";

    const errNote = errors.length > 0
      ? `<span style="color:#f87171;"> ／ ❌ エラー ${errors.length} 件あり（投入前に要確認）</span>` : "";
    const warnNote = warns.length > 0
      ? `<span style="color:#fde68a;"> ／ ⚠️ 警告 ${warns.length} 件</span>` : "";

    document.getElementById("pvSummary").innerHTML =
      `<b>${count}</b> 問 ／ branch付き <b>${branchCount}</b> 問 ／ room: <b>${room}</b>${errNote}${warnNote}`;

    renderPreviewAll();

  }catch(err){
    console.error(err);
    log("❌ エラー");
    log(err?.message || String(err));
  }
};

// プレビュー → 戻る
document.getElementById("cancelPreviewBtn").onclick = () => {
  document.getElementById("previewSection").style.display = "none";
  document.getElementById("validationBox").style.display = "none";
  logEl.textContent = "";
};

// ===== Firebase 投入（プレビュー後） =====
document.getElementById("importBtn").onclick = async () => {
  logEl.textContent = "";
  if (!lastParsedOut || Object.keys(lastParsedOut).length === 0){
    log("❌ 先に「バリデーション＋プレビュー」ボタンで確認してください");
    return;
  }
  const count = Object.keys(lastParsedOut).length;
  const ok = confirm(`${count} 問を room「${room}」に投入します。よろしいですか？\n（既存の questions は上書きされます）`);
  if (!ok) return;

  try{
    await set(ref(db, `rooms/${room}/questions`), lastParsedOut);
    log(`✅ 投入完了：${count}問`);
    log(`room: ${room}`);
    document.getElementById("previewSection").style.display = "none";
  }catch(err){
    console.error(err);
    log("❌ 投入エラー");
    log(err?.message || String(err));
  }
};

// ===== CSV書き出し =====
document.getElementById("exportNormalizedBtn").onclick = () => {
  logEl.textContent = "";
  try{
    if (!lastParsedOut){
      const text = document.getElementById("csvInput").value.trim();
      if (!text) throw new Error("貼り付け欄が空です");
      const { out } = parseCSV(text);
      lastParsedOut = out;
    }
    const csv = buildCanonicalCSVFromOut(lastParsedOut);
    downloadText(`questions_${room}_canonical.csv`, csv + "\r\n");
    log("✅ 正規化CSV（17列固定）を保存しました");
  }catch(err){
    console.error(err);
    log("❌ エラー");
    log(err?.message || String(err));
  }
};
</script>

</body>
</html>
