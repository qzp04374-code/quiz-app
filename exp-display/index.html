<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ClassSync Teacher Control</title>
  <link rel="icon" href="./icons/icon-192.png" type="image/png" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;700;900&family=DM+Mono:wght@500&display=swap" rel="stylesheet">
  <link rel="manifest" href="./manifest.webmanifest" />
  <meta name="theme-color" content="#0f172a" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />

  <style>
    /* ===== RESET & BASE ===== */
    *, *::before, *::after { box-sizing: border-box; }

    :root {
      --bg:       #060810;
      --surface:  #0d1117;
      --panel:    #111827;
      --panel2:   #0a0f1a;
      --glass:    rgba(255,255,255,.055);
      --border:   rgba(255,255,255,.09);
      --ink:      #f0f4ff;
      --muted:    #8899bb;

      --blue:     #2b7fff;
      --cyan:     #06d6f5;
      --green:    #30d158;
      --orange:   #ff9f0a;
      --red:      #ff453a;
      --purple:   #bf5af2;
      --teal:     #00c7be;
      --indigo:   #6366f1;

      --color-o:  #30d158;
      --color-x:  #ff453a;
      --color-c:  #ff9f0a;
      --color-d:  #bf5af2;

      --radius-card: 22px;
      --radius-btn:  16px;

      --font-body: 'Noto Sans JP', sans-serif;
      --font-mono: 'DM Mono', monospace;
    }

    body {
      font-family: var(--font-body);
      margin: 0;
      min-height: 100vh;
      background: var(--bg);
      background-image:
        radial-gradient(ellipse 80% 50% at 20% 0%, rgba(43,127,255,.12) 0%, transparent 60%),
        radial-gradient(ellipse 60% 40% at 80% 100%, rgba(191,90,242,.10) 0%, transparent 55%);
      display: flex;
      justify-content: center;
      padding: 28px 16px 48px;
      color: var(--ink);
    }

    /* ===== MAIN CARD ===== */
    .card {
      background: var(--panel);
      border-radius: 28px;
      padding: 28px 24px 32px;
      max-width: 1500px;
      width: 100%;
      box-shadow:
        0 0 0 1px var(--border),
        0 24px 80px rgba(0,0,0,.70),
        0 2px 0 rgba(255,255,255,.04) inset;
      position: relative;
      overflow: hidden;
    }
    .card::before {
      content: "";
      position: absolute;
      inset: 0;
      background: linear-gradient(135deg, rgba(255,255,255,.025) 0%, transparent 50%);
      pointer-events: none;
      border-radius: inherit;
    }

    /* ===== HEADER ===== */
    .page-header {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
      margin-bottom: 18px;
    }
    .logo-icon {
      width: 36px; height: 36px;
      background: linear-gradient(135deg, var(--blue), var(--cyan));
      border-radius: 10px;
      display: flex; align-items: center; justify-content: center;
      font-size: 18px;
      box-shadow: 0 4px 16px rgba(43,127,255,.40);
      flex-shrink: 0;
    }
    h2 {
      margin: 0;
      font-size: 20px;
      font-weight: 900;
      letter-spacing: .12em;
      background: linear-gradient(90deg, #fff 0%, #8899cc 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    /* ===== TOP ROW ===== */
    .topRow {
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 10px;
      flex-wrap: wrap;
      margin-bottom: 18px;
    }
    .topRow-label {
      font-size: 12px;
      font-weight: 700;
      color: var(--muted);
      letter-spacing: .08em;
    }

    select {
      border: none;
      font-family: var(--font-body);
      font-size: 13px;
      border-radius: 999px;
      padding: 9px 18px;
      background: var(--glass);
      color: #e5e7eb;
      border: 1px solid var(--border);
      outline: none;
      min-width: 160px;
      backdrop-filter: blur(8px);
      font-weight: 700;
      cursor: pointer;
      transition: border-color .15s;
    }
    select:focus { border-color: var(--blue); }

    .roomMeta {
      padding: 8px 14px;
      border-radius: 999px;
      background: var(--glass);
      border: 1px solid var(--border);
      font-size: 11px;
      font-family: var(--font-mono);
      color: var(--muted);
      white-space: nowrap;
      backdrop-filter: blur(8px);
    }

    /* ===== CONTROL GROUPS GRID ===== */
    .controlGroups {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 14px;
      margin: 0 0 18px;
    }
    @media (max-width: 980px) {
      .controlGroups { grid-template-columns: 1fr; }
    }
    @media (min-width: 1200px) {
      .controlGroups { grid-template-columns: repeat(4, minmax(0, 1fr)); }
    }

    /* ===== GROUP PANEL ===== */
    .btnGroup {
      padding: 16px 14px 14px;
      border-radius: var(--radius-card);
      background: var(--glass);
      border: 1px solid var(--border);
      backdrop-filter: blur(16px);
      position: relative;
      overflow: hidden;
    }
    .btnGroup::before {
      content: "";
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 1px;
      background: linear-gradient(90deg, transparent, rgba(255,255,255,.12), transparent);
    }

    .btnGroupTitle {
      display: flex;
      justify-content: space-between;
      align-items: center;
      color: var(--muted);
      font-weight: 900;
      letter-spacing: .10em;
      font-size: 10px;
      text-transform: uppercase;
      margin: 0 0 12px 2px;
    }
    .miniState { opacity: .9; font-weight: 700; font-size: 11px; font-family: var(--font-mono); }

    /* ===== BUTTON BASE ===== */
    button {
      font-family: var(--font-body);
      border: none;
      font-size: 13px;
      border-radius: var(--radius-btn);
      padding: 10px 16px;
      cursor: pointer;
      color: #fff;
      background: var(--glass);
      font-weight: 700;
      letter-spacing: .03em;
      transition: transform .10s ease, filter .12s ease, box-shadow .12s ease, opacity .12s ease;
      -webkit-tap-highlight-color: transparent;
    }
    button:hover { filter: brightness(1.12); }
    button:active { transform: scale(.97); filter: brightness(.95); }
    button:disabled {
      opacity: .35;
      cursor: not-allowed;
      box-shadow: none !important;
      transform: none !important;
      filter: none !important;
    }

    /* ===== CONTROL GROUP BUTTONS ===== */
    .btnRow, .pollGrid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(120px, 1fr));
      gap: 8px;
      margin-bottom: 8px;
    }
    .btnRow:last-child { margin-bottom: 0; }

    .controlGroups button {
      width: 100%;
      max-width: 200px;
      justify-self: center;
      min-height: 54px;
      padding: 10px 10px;
      border-radius: var(--radius-btn);
      border: 1px solid rgba(255,255,255,.10);
      background: rgba(255,255,255,.07);
      font-size: 13px;
      font-weight: 700;
      letter-spacing: .02em;
      box-shadow:
        0 8px 24px rgba(0,0,0,.30),
        inset 0 1px 0 rgba(255,255,255,.08);
      position: relative;
      overflow: hidden;
    }
    .controlGroups button::after {
      content: "";
      position: absolute;
      inset: 0;
      background: linear-gradient(180deg, rgba(255,255,255,.06) 0%, transparent 60%);
      pointer-events: none;
      border-radius: inherit;
    }
    .controlGroups button:hover {
      filter: brightness(1.10);
      box-shadow: 0 12px 32px rgba(0,0,0,.40), inset 0 1px 0 rgba(255,255,255,.10);
    }
    .controlGroups button:active { transform: scale(.975); }
    .controlGroups button:disabled { opacity: .32; box-shadow: none; }

    /* ===== TILE BUTTONS (投票・管理) ===== */
    .tile {
      min-height: 54px;
      border-radius: var(--radius-btn);
      border: 1px solid rgba(255,255,255,.12);
      font-weight: 900;
      letter-spacing: .04em;
    }
    .tile-ox   { background: linear-gradient(135deg, #1a9e3f, #06b6d4); box-shadow: 0 8px 24px rgba(6,182,212,.20); }
    .tile-five { background: linear-gradient(135deg, #7c3aed, #a855f7); box-shadow: 0 8px 24px rgba(168,85,247,.20); }
    .tile-text { background: linear-gradient(135deg, #d97706, #f59e0b); color:#fff !important; box-shadow: 0 8px 24px rgba(245,158,11,.20); }
    .tile-admin  { background: rgba(100,116,139,.18); }
    .tile-admin2 { background: linear-gradient(135deg, #166534, #22c55e); box-shadow: 0 8px 20px rgba(34,197,94,.18); }

    /* ===== SPECIFIC BUTTON COLORS ===== */
    #prevQuestionBtn {
      background: rgba(120,120,130,.25) !important;
      border-color: rgba(120,120,130,.32) !important;
    }
    #nextQuestionBtn {
      background: linear-gradient(135deg, #1d6fdb, var(--blue)) !important;
      border-color: rgba(43,127,255,.45) !important;
      box-shadow: 0 8px 28px rgba(43,127,255,.30) !important;
    }
    #stopBtn {
      background: linear-gradient(135deg, #c47400, var(--orange)) !important;
      border-color: rgba(255,159,10,.45) !important;
      box-shadow: 0 8px 24px rgba(255,159,10,.28) !important;
    }
    #endClassBtn {
      background: linear-gradient(135deg, #c0362b, var(--red)) !important;
      border-color: rgba(255,69,58,.45) !important;
      box-shadow: 0 8px 24px rgba(255,69,58,.28) !important;
    }
    #qrBtn, #projectionBtn {
      background: linear-gradient(135deg, #9333ea, var(--purple)) !important;
      border-color: rgba(191,90,242,.45) !important;
      box-shadow: 0 8px 24px rgba(191,90,242,.25) !important;
    }
    #t20Btn, #t30Btn, #t60Btn, #tOffBtn {
      width: 58px !important; height: 58px !important;
      max-width: none !important; padding: 0 !important;
      border-radius: 999px !important;
      background: linear-gradient(135deg, #1a8a3a, var(--green)) !important;
      border-color: rgba(48,209,88,.40) !important;
      box-shadow: 0 8px 22px rgba(48,209,88,.28) !important;
      font-weight: 900 !important;
      font-size: 12px !important;
    }
    #importBtn {
      background: rgba(99,102,241,.30) !important;
      border-color: rgba(99,102,241,.38) !important;
    }
    #dictBtn {
      background: linear-gradient(135deg, #166534, #22c55e) !important;
      border-color: rgba(50,215,75,.40) !important;
      box-shadow: 0 8px 22px rgba(50,215,75,.20) !important;
    }
    #branchSetBtn {
      background: linear-gradient(135deg, #0a9e98, var(--teal)) !important;
      border-color: rgba(0,199,190,.45) !important;
      box-shadow: 0 8px 22px rgba(0,199,190,.22) !important;
    }

    /* ===== REVEAL TOGGLE BUTTON ===== */
    #revealBtn {
      background: rgba(120,120,130,.22) !important;
      border-color: rgba(120,120,130,.30) !important;
      position: relative !important;
      padding-left: 56px !important;
      text-align: left !important;
    }
    #revealBtn.on {
      background: linear-gradient(135deg, #c47400, var(--orange)) !important;
      border-color: rgba(255,159,10,.45) !important;
      box-shadow: 0 8px 24px rgba(255,159,10,.28) !important;
    }
    #revealBtn::before {
      content: "";
      position: absolute;
      left: 14px; top: 50%;
      transform: translateY(-50%);
      width: 34px; height: 20px;
      border-radius: 999px;
      background: rgba(255,255,255,.18);
      box-shadow: inset 0 0 0 1px rgba(255,255,255,.16);
    }
    #revealBtn::after {
      content: "";
      position: absolute;
      left: 16px; top: 50%;
      transform: translateY(-50%);
      width: 16px; height: 16px;
      border-radius: 999px;
      background: #fff;
      box-shadow: 0 2px 8px rgba(0,0,0,.30);
      transition: left 130ms cubic-bezier(.4,0,.2,1);
    }
    #revealBtn.on::after { left: 30px; }

    /* ===== TIMER ROW ===== */
    .timerRow {
      display: flex !important;
      justify-content: center;
      align-items: center;
      gap: 10px;
    }

    /* ===== PILLS (live counts) ===== */
    .pill {
      padding: 8px 14px;
      border-radius: 999px;
      background: rgba(255,255,255,.08);
      border: 1px solid rgba(255,255,255,.10);
      font-weight: 900;
      font-family: var(--font-mono);
      font-size: 13px;
      letter-spacing: .04em;
      transition: background .2s, transform .1s;
    }
    .pill:hover { background: rgba(255,255,255,.12); }

    /* ===== TEXT LIST ===== */
    .textList {
      max-height: 260px;
      overflow: auto;
      padding: 10px;
      border-radius: 14px;
      background: rgba(0,0,0,.22);
      border: 1px solid var(--border);
    }
    .textItem {
      padding: 10px 12px;
      border-radius: 12px;
      background: rgba(255,255,255,.06);
      margin-bottom: 8px;
      line-height: 1.45;
      word-break: break-word;
      border: 1px solid var(--border);
    }
    .textMeta { font-size: 11px; opacity: .65; margin-top: 5px; font-family: var(--font-mono); }

    /* ===== PREVIEW SECTION ===== */
    #preview {
      margin-top: 18px;
      padding: 20px;
      border-radius: var(--radius-card);
      background: var(--panel2);
      border: 1px solid var(--border);
      position: relative;
      overflow: hidden;
    }
    #preview::before {
      content: "";
      position: absolute;
      top: 0; left: 0; right: 0; height: 1px;
      background: linear-gradient(90deg, transparent, rgba(255,255,255,.10), transparent);
    }
    #preview h3 {
      margin: 0 0 14px 0;
      font-size: 13px;
      font-weight: 900;
      letter-spacing: .10em;
      text-transform: uppercase;
      color: var(--muted);
    }
    .pvGrid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 14px;
      margin-top: 10px;
    }
    @media (max-width: 980px) {
      .pvGrid { grid-template-columns: 1fr; }
    }
    .pvCard {
      background: rgba(255,255,255,.03);
      border: 1px solid var(--border);
      border-radius: 18px;
      padding: 16px;
      position: relative;
    }
    .pvHead {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 10px;
    }
    .pvBadge {
      font-weight: 900;
      font-size: 10px;
      letter-spacing: .14em;
      text-transform: uppercase;
      padding: 5px 11px;
      border-radius: 999px;
      background: rgba(6,182,212,.18);
      border: 1px solid rgba(6,182,212,.32);
      color: #67e8f9;
    }
    .pvBadge.next {
      background: rgba(168,85,247,.18);
      border: 1px solid rgba(168,85,247,.32);
      color: #d8b4fe;
    }
    .pvMeta {
      font-size: 11px;
      color: var(--muted);
      font-weight: 700;
      font-family: var(--font-mono);
    }
    .pv-question { font-size: 14px; font-weight: 700; line-height: 1.55; margin-bottom: 8px; }
    .pv-choice { margin-left: 10px; margin-bottom: 4px; font-size: 13px; color: #94a3b8; }
    .pv-answer { margin-top: 10px; font-weight: 900; color: var(--green); font-size: 13px; }
    .pv-explanation { margin-top: 6px; font-size: 13px; color: var(--muted); white-space: pre-wrap; }

    /* ===== LIVE RESULTS SECTION ===== */
    #teacherLive {
      margin-top: 16px;
      padding: 20px;
      border-radius: var(--radius-card);
      background: var(--panel2);
      border: 1px solid var(--border);
      position: relative;
      overflow: hidden;
    }
    #teacherLive::before {
      content: "";
      position: absolute;
      top: 0; left: 0; right: 0; height: 1px;
      background: linear-gradient(90deg, transparent, rgba(255,255,255,.10), transparent);
    }
    #teacherLive h3 {
      margin: 0 0 12px 0;
      font-size: 13px;
      font-weight: 900;
      letter-spacing: .10em;
      text-transform: uppercase;
      color: var(--muted);
    }

    /* ===== BUILD TAG ===== */
    #buildTag {
      position: fixed;
      right: 12px; bottom: 12px;
      opacity: .50;
      font-size: 11px;
      font-family: var(--font-mono);
      z-index: 60;
      background: rgba(0,0,0,.40);
      border: 1px solid rgba(255,255,255,.07);
      padding: 5px 10px;
      border-radius: 999px;
      backdrop-filter: blur(10px);
      color: var(--muted);
      pointer-events: none;
    }

    /* ===== PAGE LOAD ANIMATION ===== */
    @keyframes fadeUp {
      from { opacity:0; transform: translateY(14px); }
      to   { opacity:1; transform: translateY(0); }
    }
    .card      { animation: fadeUp .40s ease both; }
    .btnGroup  { animation: fadeUp .40s ease both; }
    .btnGroup:nth-child(1) { animation-delay: .06s; }
    .btnGroup:nth-child(2) { animation-delay: .10s; }
    .btnGroup:nth-child(3) { animation-delay: .14s; }
    .btnGroup:nth-child(4) { animation-delay: .18s; }
    #preview      { animation: fadeUp .40s .22s ease both; }
    #teacherLive  { animation: fadeUp .40s .26s ease both; }
</style>
</head>

<body>
  <div id="buildTag">build: 2026-03-15 / no-game-v2</div>

  <div class="card">
    <div class="page-header">
      <div class="logo-icon">🎓</div>
      <h2>ClassSync — 教員コントロール</h2>
    </div>

    <div class="topRow">
      <span class="topRow-label">ROOM</span>
      <select id="roomSelect"></select>
      <span id="roomMeta" class="miniState roomMeta">—</span>
    </div>

    <div class="controlGroups">
      <!-- ① 出題・回収 -->
      <section class="btnGroup">
        <div class="btnGroupTitle"><span>① 出題 · 回収</span></div>
        <div class="btnRow">
          <button id="prevQuestionBtn">問題戻る ◀</button>
          <button id="nextQuestionBtn">次の問題 ▶</button>
        </div>
        <div class="btnRow">
          <button id="stopBtn">解答終了</button>
          <button id="branchSetBtn">分岐セット</button>
        </div>
      </section>

      <!-- ② タイマー -->
      <section class="btnGroup">
        <div class="btnGroupTitle"><span>② タイマー</span></div>
        <div class="btnRow timerRow">
          <button id="t20Btn">⏱20</button>
          <button id="t30Btn">⏱30</button>
          <button id="t60Btn">⏱60</button>
          <button id="tOffBtn">⏹停止</button>
        </div>
      </section>

      <!-- ③ 表示・参加 -->
      <section class="btnGroup">
        <div class="btnGroupTitle"><span>③ 表示 · 参加</span></div>
        <div class="btnRow">
          <button id="qrBtn">QRコード</button>
          <button id="projectionBtn">display表示</button>
        </div>
        <div class="btnRow">
          <button id="revealBtn">結果：即時公開</button>
        </div>
        <div class="btnRow">
          <button id="endClassBtn">授業終了</button>
        </div>
      </section>

      <!-- ④ 投票・管理 -->
      <section class="btnGroup">
        <div class="btnGroupTitle"><span>④ 投票 · 管理</span></div>
        <div class="pollGrid">
          <button id="quick2Btn" class="tile tile-ox">投票 ○✕</button>
          <button id="quick5Btn" class="tile tile-five">投票 5択</button>
          <button id="quickTextBtn" class="tile tile-text">投票 TEXT</button>
          <button id="importBtn" class="tile tile-admin">CSV投入</button>
          <button id="dictBtn" class="tile tile-admin2">読み方（辞書）</button>
          <button id="setExpectedFromVotesBtn" class="tile tile-admin">母数=投票人数</button>

        </div>
      </section>
    </div>

    <!-- プレビュー（2枚） -->
    <div id="preview">
      <h3>📋 出題プレビュー（現在 ＋ 次の1問）</h3>

      <div class="pvGrid">
        <section class="pvCard">
          <div class="pvHead">
            <div class="pvBadge">現在</div>
            <div class="pvMeta" id="pvQid">ID: —</div>
          </div>
          <div id="pvQuestion">問題を待っています…</div>
          <div id="pvChoices"></div>
          <div id="pvAnswer" class="pv-answer"></div>
          <div id="pvExplanation" class="pv-explanation"></div>
        </section>

        <section class="pvCard">
          <div class="pvHead">
            <div class="pvBadge next">次</div>
            <div class="pvMeta" id="pvQidNext">ID: —</div>
          </div>
          <div id="pvQuestionNext">（次の問題）</div>
          <div id="pvChoicesNext"></div>
          <div id="pvAnswerNext" class="pv-answer"></div>
          <div id="pvExplanationNext" class="pv-explanation"></div>
        </section>
      </div>
    </div>

    <!-- 教師用：リアルタイム結果 -->
    <div id="teacherLive">
      <h3>📊 リアルタイム結果</h3>

      <div id="liveCounts" style="display:flex; gap:10px; flex-wrap:wrap; margin:10px 0;">
        <div class="pill" id="liveTotal">Total: 0</div>
        <div class="pill" id="liveO">O: 0</div>
        <div class="pill" id="liveX">X: 0</div>
        <div class="pill" id="liveA">A: 0</div>
        <div class="pill" id="liveB">B: 0</div>
        <div class="pill" id="liveC">C: 0</div>
        <div class="pill" id="liveD">D: 0</div>
        <div class="pill" id="liveE">E: 0</div>
      </div>

      <div id="liveTextWrap" style="display:none;">
        <div style="opacity:.85; margin:8px 0 6px;">TEXT（最新20件）</div>
        <div id="liveTextList" class="textList"></div>
      </div>
    </div>

  </div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getDatabase, ref, set, update, remove, onValue, get } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

    const firebaseConfig = {
      apiKey: "AIzaSyBke-wTU16skpbK8z80ddK04tE154dHERQ",
      databaseURL: "https://satosan-41eac-default-rtdb.asia-southeast1.firebasedatabase.app",
      projectId: "satosan-41eac"
    };

    const app = initializeApp(firebaseConfig);
    const db  = getDatabase(app);

    // ルーム
    const roomSelect = document.getElementById("roomSelect");
    const ROOMS = [
      { id: "kyoto-01",  label: "Kyoto-01"  },
      { id: "kyoto-02",  label: "Kyoto-02"  },
      { id: "sendai-01", label: "Sendai-01" },
      { id: "sendai-02", label: "Sendai-02" },
      { id: "nagoya-01", label: "Nagoya-01" },
      { id: "nagoya-02", label: "Nagoya-02" },
    ];

    function buildRoomOptions(){
      roomSelect.innerHTML = "";
      for (const r of ROOMS){
        const opt = document.createElement("option");
        opt.value = r.id;
        opt.textContent = r.label;
        roomSelect.appendChild(opt);
      }
    }

    const url = new URL(location.href);
    const urlRoom = url.searchParams.get("room");
    const savedRoom = localStorage.getItem("cs_teacher_room");

    buildRoomOptions();

    let currentRoom =
      (urlRoom && ROOMS.some(r => r.id === urlRoom)) ? urlRoom :
      (savedRoom && ROOMS.some(r => r.id === savedRoom)) ? savedRoom :
      ROOMS[0].id;

    roomSelect.value = currentRoom;

    // refs
    function activityRef(room=currentRoom){ return ref(db, `rooms/${room}/activity`); }
    function answersRef(room=currentRoom){ return ref(db, `rooms/${room}/answers`); }

    function qidRef(room=currentRoom){ return ref(db, `rooms/${room}/quiz/current_question_id`); }
    function questionsRef(room=currentRoom){ return ref(db, `rooms/${room}/questions`); }
    function questionRef(qid, room=currentRoom){ return ref(db, `rooms/${room}/questions/${qid}`); }

    const pvQuestion = document.getElementById("pvQuestion");
    const pvChoices  = document.getElementById("pvChoices");
    const pvAnswer   = document.getElementById("pvAnswer");
    const pvExplanation = document.getElementById("pvExplanation");
    const pvQid = document.getElementById("pvQid");

    const pvQuestionNext = document.getElementById("pvQuestionNext");
    const pvChoicesNext  = document.getElementById("pvChoicesNext");
    const pvAnswerNext   = document.getElementById("pvAnswerNext");
    const pvExplanationNext = document.getElementById("pvExplanationNext");
    const pvQidNext = document.getElementById("pvQidNext");

    const btnPrev = document.getElementById("prevQuestionBtn");
    const btnNext = document.getElementById("nextQuestionBtn");
    const btnStop = document.getElementById("stopBtn");
    const btnBranchSet = document.getElementById("branchSetBtn");
    const btnQR   = document.getElementById("qrBtn");
    const btnT20  = document.getElementById("t20Btn");
    const btnT30  = document.getElementById("t30Btn");
    const btnT60  = document.getElementById("t60Btn");
    const btnTOff = document.getElementById("tOffBtn");
    const btnQ2   = document.getElementById("quick2Btn");
    const btnQ5   = document.getElementById("quick5Btn");
    const btnQT   = document.getElementById("quickTextBtn");
    const btnReveal = document.getElementById("revealBtn");
    const btnSetExpectedFromVotes = document.getElementById("setExpectedFromVotesBtn");

    async function clearAnswers(){ await set(answersRef(), {}); }

    async function refreshOrder(){
      const snap = await get(questionsRef());
      return Object.keys(snap.val() || {}).sort();
    }

    function uiLabel(key){
      const k = String(key).trim().toUpperCase();
      if (k === "O") return "○";
      if (k === "X") return "✕";
      return k;
    }

    // state
    const state = {
      activity: {},
      latestQid: null,
      question: null,

      nextQid: null,
      nextQuestion: null,

      unsubActivity: null,
      unsubQid: null,
      unsubQuestion: null,
      unsubNextQuestion: null,
      unsubAnswers: null
    };

    function subscribeQuestion(qid){
      if (state.unsubQuestion){ state.unsubQuestion(); state.unsubQuestion = null; }
      state.question = null;

      if (!qid){ renderPreview(); return; }

      state.unsubQuestion = onValue(questionRef(qid), snap => {
        state.question = snap.val() || null;
        renderPreview();
      });
    }

    function subscribeNextQuestion(qid){
      if (state.unsubNextQuestion){ state.unsubNextQuestion(); state.unsubNextQuestion = null; }
      state.nextQuestion = null;
      state.nextQid = qid || null;

      if (!qid){ renderPreview(); return; }

      state.unsubNextQuestion = onValue(questionRef(qid), snap => {
        state.nextQuestion = snap.val() || null;
        renderPreview();
      });
    }

    async function updateNextSubscription(){
      const base = state.latestQid;
      if (!base){ subscribeNextQuestion(null); return; }

      const order = await refreshOrder();
      const i = order.indexOf(base);
      const next = (i >= 0) ? (order[i+1] || null) : (order[0] || null);

      if (state.latestQid !== base) return;
      subscribeNextQuestion(next);
    }

    // mode推定（既存の揺れ対策）
    function guessMode(q){
      const m = String(q?.mode ?? "").toLowerCase().trim();
      if (m) return m;
      const keys = q?.choices ? Object.keys(q.choices).map(x => String(x).toUpperCase()) : [];
      if (keys.length === 2 && keys.includes("O") && keys.includes("X")) return "ox";
      if (["A","B","C","D","E"].every(k => keys.includes(k))) return "five";
      return "text";
    }

    // 出題（quiz）
    async function startQuizQuestion(qid){
      if (!qid) return;

      await set(qidRef(), qid);
      await clearAnswers();

      const qs = await get(questionRef(qid));
      const q = qs.val() || {};

      let mode = guessMode(q);

      let config = null;
      if (mode === "text") config = { type:"text" };
      else if (mode === "ox") config = { choices:["O","X"] };
      else if (mode === "five") config = { choices:["A","B","C","D","E"] };

      // ★既存 session を維持（なければ作る）
      const aSnap = await get(activityRef());
      const aNow = aSnap.val() || {};
      const session = String(aNow.session || "") || Date.now().toString(36);
      
      await update(activityRef(), {
        status:"open",
        qr:false,
        view:"quiz",
        mode,
        config,
        timer:{ running:false },
        session
      });
    }

    // クイック投票（poll）
    async function startQuickPoll(mode){
      await clearAnswers();
      let config = null;
      if (mode === "text") config = { type:"text" };
      else if (mode === "ox") config = { choices:["O","X"] };
      else if (mode === "five") config = { choices:["A","B","C","D","E"] };

      // ★既存 session を維持（なければ作る）
      const aSnap = await get(activityRef());
      const aNow = aSnap.val() || {};
      const session = String(aNow.session || "") || Date.now().toString(36);
      
      await update(activityRef(), {
        status:"open",
        qr:false,
        view:"poll",
        mode,
        config,
        timer:{ running:false },
        session
      });
      }
      
    async function setExpectedFromVotes(){
      const snap = await get(answersRef());
      const ans = snap.val() || {};
      const n = Object.keys(ans).length;

      if (n <= 0){
        alert("まだ投票がありません（answers=0）");
        return;
      }

      const ok = confirm(`今回の投票人数 ${n} 人を、100%人数（母数）に設定しますか？`);
      if (!ok) return;

      await update(activityRef(), { expectedN: n });
      alert(`100%人数（母数）を ${n} 人に設定しました。`);
    }

    // タイマー
    async function startTimer(sec){
      await update(activityRef(), {
        timer: {
          running: true,
          endsAt: Date.now() + sec * 1000,
          durationSec: sec,
          autoClose: true
        }
      });
    }

    async function stopTimer(){
      await update(activityRef(), { timer: { running: false } });
    }

    // 結果公開方式トグル（live <-> closed）
    async function toggleRevealMode(){
      const cur = (state.activity?.revealMode === "closed") ? "closed" : "live";
      const next = (cur === "live") ? "closed" : "live";
      await update(activityRef(), { revealMode: next });
    }

    // QRトグル
    async function toggleQR(){
      const isQR = (state.activity?.qr === true);

      if (!isQR){
        const session = Date.now().toString(36);
        await update(activityRef(), {
          qr:true,
          view:"qr",
          session: session   // ★追加
        });

        return;
      }

      await update(activityRef(), {
        qr:false,
        view:"standby",
        status:"ready",
        mode:null,
        config:null
      });
    }

    // ===== 分岐（クラス全体・多数決）=====
    function extractAnswerValue(v){
      if (v == null) return "";
      if (typeof v === "string") return v;
      if (typeof v === "object" && typeof v.value === "string") return v.value;
      return "";
    }

    function pickWinnerFromAnswers(mode, answersObj){
      const keys = (mode === "five") ? ["A","B","C","D","E"] : ["O","X"];
      const count = Object.fromEntries(keys.map(k => [k, 0]));

      const answers = answersObj || {};
      for (const v of Object.values(answers)){
        const s = String(extractAnswerValue(v)).trim().toUpperCase();
        if (count.hasOwnProperty(s)) count[s]++;
      }

      // 同票は keys の先頭が勝つ（安定・再現性優先）
      let bestK = keys[0];
      let bestV = -1;
      for (const k of keys){
        const v = count[k] ?? 0;
        if (v > bestV){
          bestV = v;
          bestK = k;
        }
      }
      return { winner: bestK, count };
    }

    async function branchSetNextQuestionId(){
      // 1) 現在qid
      const qidSnap = await get(qidRef());
      const qid = qidSnap.val() || null;
      if (!qid){
        alert("current_question_id がありません");
        return;
      }

      // 2) 現在問題データ
      const qSnap = await get(questionRef(qid));
      const q = qSnap.val() || null;
      if (!q){
        alert(`questions/${qid} が見つかりません`);
        return;
      }

      // 3) mode（ox / five のみ対応。textは分岐不可）
      const mode = guessMode(q);
      if (mode !== "ox" && mode !== "five"){
        alert(`分岐は ox / five のみ対応です（現在 mode=${mode}）`);
        return;
      }

      // 4) answersから多数決
      const ansSnap = await get(answersRef());
      const answersObj = ansSnap.val() || {};
      const n = Object.keys(answersObj).length;
      if (n <= 0){
        alert("まだ投票がありません（answers=0）");
        return;
      }

      const { winner, count } = pickWinnerFromAnswers(mode, answersObj);

      // 5) branch を読む（問題データに持つのが本命）
      const branch = (q.branch && typeof q.branch === "object") ? q.branch : null;
      const nextId = branch ? branch[winner] : null;

      if (!nextId){
        const msg =
          `分岐先が未定義です。\n\n` +
          `qid=${qid}\nmode=${mode}\n多数決=${winner}\n\n` +
          `questions/${qid}/branch に { "${winner}": "次の問題ID" } を設定してください。\n\n` +
          `現在の票：${JSON.stringify(count)}`;
        alert(msg);
        return;
      }

      // 6) 次の問題IDだけセット（openはしない）
      await set(qidRef(), nextId);

      alert(
        `分岐セット完了\n` +
        `qid: ${qid} → ${nextId}\n` +
        `mode: ${mode}\n` +
        `多数決: ${winner}\n\n` +
        `※ open はしません。必要なら「次の問題▶」等で開始してください。`
      );
    }

    // プレビュー描画（正解・解説は常時表示）
    function renderPreview(){
      const a = state.activity || {};
      const view = a.view || "quiz";
      const status = a.status || "-";
      const mode = a.mode || "-";
      const qr = (a.qr === true);
      const reveal = (a.revealMode === "closed") ? "closed" : "live";

      const lock = (a.qr === true);
      btnPrev.disabled = lock;
      btnNext.disabled = lock;
      btnStop.disabled = lock;
      btnBranchSet.disabled = lock;          // ★追加：分岐もQR中はロック
      btnQ2.disabled = lock;
      btnQ5.disabled = lock;
      btnQT.disabled = lock;
      btnT20.disabled  = lock;
      btnT30.disabled  = lock;
      btnT60.disabled  = lock;
      btnTOff.disabled = lock;

      btnReveal.disabled = lock;
      btnReveal.classList.toggle("on", reveal === "closed");
      btnReveal.textContent = (reveal === "closed")
        ? "結果：解答終了で公開"
        : "結果：即時公開";

      const meta =
        `room:${currentRoom} / view:${view} / status:${status} / mode:${mode} / reveal:${reveal}${qr ? " / QR" : ""}`;

      const roomMeta = document.getElementById("roomMeta");
      if (roomMeta) roomMeta.textContent = meta;

      if (view === "standby"){
        pvQid.textContent = `ID: ${state.latestQid || "—"}`;
        pvQuestion.textContent = "（スタンバイ中… 次の問題を待っています）";
        pvChoices.innerHTML = "";
        pvAnswer.textContent = "";
        pvExplanation.textContent = "";

        pvQidNext.textContent = "ID: —";
        pvQuestionNext.textContent = "—";
        pvChoicesNext.innerHTML = "";
        pvAnswerNext.textContent = "";
        pvExplanationNext.textContent = "";
        return;
      }

      if (view === "poll"){
        pvQid.textContent = `ID: ${state.latestQid || "—"}`;
        pvQuestion.textContent = "（クイック投票：問題表示なし / 集計のみ）";
        pvChoices.innerHTML = "";
        pvAnswer.textContent = "";
        pvExplanation.textContent = "";

        pvQidNext.textContent = "ID: —";
        pvQuestionNext.textContent = "—";
        pvChoicesNext.innerHTML = "";
        pvAnswerNext.textContent = "";
        pvExplanationNext.textContent = "";
        return;
      }

      // 現在
      const q = state.question;
      if (!state.latestQid){
        pvQid.textContent = "ID: —";
        pvQuestion.textContent = "問題を待っています…";
        pvChoices.innerHTML = "";
        pvAnswer.textContent = "";
        pvExplanation.textContent = "";
      } else if (!q){
        pvQid.textContent = `ID: ${state.latestQid}`;
        pvQuestion.textContent = `（${state.latestQid}：問題データ待ち）`;
        pvChoices.innerHTML = "";
        pvAnswer.textContent = "";
        pvExplanation.textContent = "";
      } else {
        pvQid.textContent = `ID: ${state.latestQid}`;
        pvQuestion.textContent = q.question || "";

        pvChoices.innerHTML = "";
        if (q.choices && typeof q.choices === "object"){
          Object.entries(q.choices).forEach(([k, v]) => {
            const div = document.createElement("div");
            div.className = "pv-choice";
            div.textContent = `${uiLabel(k)}：${v}`;
            pvChoices.appendChild(div);
          });
        }

        const ans = (q.answer || "").toString().trim().toUpperCase();
        pvAnswer.textContent = ans ? `正解：${uiLabel(ans)}` : "正解：—";
        pvExplanation.textContent = q.explanation ? `解説：${q.explanation}` : "";
      }

      // 次（現状は「並び順の次」を表示。分岐先は branchSet で決める運用）
      const q2id = state.nextQid;
      const q2 = state.nextQuestion;

      pvQidNext.textContent = `ID: ${q2id || "—"}`;

      if (!q2id){
        pvQuestionNext.textContent = "（次の問題なし）";
        pvChoicesNext.innerHTML = "";
        pvAnswerNext.textContent = "";
        pvExplanationNext.textContent = "";
        return;
      }
      if (!q2){
        pvQuestionNext.textContent = `（${q2id}：問題データ待ち）`;
        pvChoicesNext.innerHTML = "";
        pvAnswerNext.textContent = "";
        pvExplanationNext.textContent = "";
        return;
      }

      pvQuestionNext.textContent = q2.question || "";
      pvChoicesNext.innerHTML = "";
      if (q2.choices && typeof q2.choices === "object"){
        Object.entries(q2.choices).forEach(([k, v]) => {
          const div = document.createElement("div");
          div.className = "pv-choice";
          div.textContent = `${uiLabel(k)}：${v}`;
          pvChoicesNext.appendChild(div);
        });
      }

      const ans2 = (q2.answer || "").toString().trim().toUpperCase();
      pvAnswerNext.textContent = ans2 ? `正解：${uiLabel(ans2)}` : "正解：—";
      pvExplanationNext.textContent = q2.explanation ? `解説：${q2.explanation}` : "";
    }

    function extractTimestamp(v){
      if (v && typeof v === "object" && typeof v.timestamp === "number") return v.timestamp;
      return 0;
    }

    function renderTeacherLive(mode, answersObj){
      const answers = answersObj || {};
      const vals = Object.values(answers).map(extractAnswerValue).filter(Boolean);

      const total = vals.length;
      const count = { O:0, X:0, A:0, B:0, C:0, D:0, E:0 };
      for (const s of vals){
        const up = String(s).trim().toUpperCase();
        if (count.hasOwnProperty(up)) count[up]++;
      }

      const setText = (id, text) => { const el = document.getElementById(id); if (el) el.textContent = text; };
      const show = (id, ok) => { const el = document.getElementById(id); if (el) el.style.display = ok ? "" : "none"; };

      setText("liveTotal", `Total: ${total}`);

      const isOX = (mode === "ox");
      const isFive = (mode === "five");
      const isText = (mode === "text");

      show("liveO", isOX); show("liveX", isOX);
      show("liveA", isFive); show("liveB", isFive); show("liveC", isFive); show("liveD", isFive); show("liveE", isFive);

      if (isOX){
        setText("liveO", `O: ${count.O}`);
        setText("liveX", `X: ${count.X}`);
      }
      if (isFive){
        setText("liveA", `A: ${count.A}`);
        setText("liveB", `B: ${count.B}`);
        setText("liveC", `C: ${count.C}`);
        setText("liveD", `D: ${count.D}`);
        setText("liveE", `E: ${count.E}`);
      }

      const wrap = document.getElementById("liveTextWrap");
      if (wrap) wrap.style.display = isText ? "" : "none";

      if (isText) renderTeacherTextList(answersObj);
    }

    function renderTeacherTextList(answersObj){
      const list = document.getElementById("liveTextList");
      if (!list) return;

      const answers = answersObj || {};
      const items = Object.entries(answers).map(([uid, v]) => ({
        uid,
        text: extractAnswerValue(v),
        ts: extractTimestamp(v),
      })).filter(x => x.text);

      items.sort((a,b) => (b.ts||0) - (a.ts||0));
      const top = items.slice(0, 20);

      const esc = (s) => String(s).replaceAll("&","&amp;").replaceAll("<","&lt;").replaceAll(">","&gt;");
      list.innerHTML = top.map(x => {
        const when = x.ts ? new Date(x.ts).toLocaleString() : "";
        return `
          <div class="textItem">
            ${esc(x.text)}
            <div class="textMeta">${when ? `🕒 ${when}` : ""}</div>
          </div>
        `;
      }).join("") || `<div style="opacity:.75;">まだ回答がありません</div>`;
    }

    function attachRoom(room){
      currentRoom = room;
      roomSelect.value = room;

      if (state.unsubActivity){ state.unsubActivity(); state.unsubActivity = null; }
      if (state.unsubQid){ state.unsubQid(); state.unsubQid = null; }
      if (state.unsubQuestion){ state.unsubQuestion(); state.unsubQuestion = null; }
      if (state.unsubNextQuestion){ state.unsubNextQuestion(); state.unsubNextQuestion = null; }
      if (state.unsubAnswers){ state.unsubAnswers(); state.unsubAnswers = null; }

      state.activity = {};
      state.latestQid = null;
      state.question = null;
      state.nextQid = null;
      state.nextQuestion = null;

      state.unsubActivity = onValue(activityRef(room), snap => {
        state.activity = snap.val() || {};
        renderPreview();

        if ((state.activity.view || "quiz") === "quiz"){
          subscribeQuestion(state.latestQid);
        }
      });

      state.unsubQid = onValue(qidRef(room), snap => {
        state.latestQid = snap.val() || null;
        updateNextSubscription();

        if ((state.activity.view || "quiz") === "quiz"){
          subscribeQuestion(state.latestQid);
        } else {
          renderPreview();
        }
      });

      state.unsubAnswers = onValue(answersRef(room), (snap) => {
        const answersObj = snap.val() || {};
        const mode = (state.activity?.mode || "ox").toLowerCase();
        renderTeacherLive(mode, answersObj);
      });

      renderPreview();
    }

    // イベント
    roomSelect.onchange = () => {
      currentRoom = roomSelect.value;
      localStorage.setItem("cs_teacher_room", currentRoom);
      attachRoom(currentRoom);
    };

    btnNext.onclick = async () => {
      const order = await refreshOrder();
      const cur = (await get(qidRef())).val();
      const i = order.indexOf(cur);
      const next = i < 0 ? order[0] : order[i + 1];
      if (next) startQuizQuestion(next);
    };

    btnPrev.onclick = async () => {
      const order = await refreshOrder();
      const cur = (await get(qidRef())).val();
      const i = order.indexOf(cur);
      const prev = i > 0 ? order[i - 1] : order[0];
      if (prev) startQuizQuestion(prev);
    };

    btnStop.onclick = async () => { await update(activityRef(), { status:"closed" }); };

    // ★追加：分岐セット（次IDだけ更新。openしない）
    btnBranchSet.onclick = async () => {
      try{
        await branchSetNextQuestionId();
      }catch(e){
        console.error(e);
        alert("分岐セットでエラーが出ました（console を確認してください）");
      }
    };

    btnQR.onclick = async () => { await toggleQR(); };
    btnReveal.onclick = async () => { await toggleRevealMode(); };
    btnSetExpectedFromVotes.onclick = async () => { await setExpectedFromVotes(); };

    btnQ2.onclick = async () => { await startQuickPoll("ox"); };
    btnQ5.onclick = async () => { await startQuickPoll("five"); };
    btnQT.onclick = async () => { await startQuickPoll("text"); };

    btnT20.onclick  = () => startTimer(20);
    btnT30.onclick  = () => startTimer(30);
    btnT60.onclick  = () => startTimer(60);
    btnTOff.onclick = () => stopTimer();

    document.getElementById("projectionBtn").onclick = () => {
      window.open(`https://qzp04374-code.github.io/quiz-app/exp-display/display.html?room=${encodeURIComponent(currentRoom)}`, "_blank");
    };
    document.getElementById("importBtn").onclick = () => {
      window.open(`https://qzp04374-code.github.io/quiz-app/exp-display/import-csv.html?room=${encodeURIComponent(currentRoom)}`, "_blank");
    };
    document.getElementById("dictBtn").onclick = () => {
      window.open(`https://qzp04374-code.github.io/quiz-app/exp-display/dict-editor.html?room=${encodeURIComponent(currentRoom)}`, "_blank");
    };

    document.getElementById("endClassBtn").onclick = async () => {
      const ok1 = confirm("授業終了します。データを削除しますか？（1/2）");
      if (!ok1) return;
      const ok2 = confirm("本当に削除しますか？（2/2）");
      if (!ok2) return;
      await remove(ref(db, `rooms/${currentRoom}`));
      alert("授業データを削除しました。");
    };

    // 起動
    attachRoom(currentRoom);
  </script>
