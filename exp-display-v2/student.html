<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
  <title>ClassSync v2 Student</title>
  <link rel="icon" href="data:,">
  <style>
    :root{
      --color-o:#34c759; --color-x:#ff3b30;
      --color-a:#0a84ff; --color-b:#30d158;
      --color-c:#ff9f0a; --color-d:#bf5af2; --color-e:#ff375f;

      --bg:#050608;
      --ink:#f9fafb;
      --muted:rgba(203,213,225,.85);
      --line:rgba(255,255,255,.10);
      --shadow:0 18px 60px rgba(0,0,0,.65);
    }

    /* ===== Seat FX ===== */
    .padShell{ position:relative; }
    .padArea{ position:relative; }

    .padArea::after{
      content:""; position:absolute; inset:-2px;
      border-radius:24px; pointer-events:none; opacity:0; z-index:25;
    }
    .padShell.seatWin .padArea::after{
      background:radial-gradient(900px 520px at 50% 70%,
        color-mix(in oklab, var(--seat-flash, rgba(10,132,255,1)) 65%, transparent),
        transparent 62%);
      animation:seatWinFlash 620ms ease-out both;
      filter:saturate(1.35) brightness(1.15);
    }
    .padShell.seatLose .padArea::after{
      background:radial-gradient(900px 520px at 50% 70%, rgba(255,59,48,.55), transparent 62%);
      animation:seatLoseFlash 520ms ease-out both;
    }
    .padShell.seatLose{ animation:seatShake 420ms ease-in-out both; }

    @keyframes seatWinFlash{
      0%{opacity:0;transform:scale(.985);} 18%{opacity:1;transform:scale(1.00);} 100%{opacity:0;transform:scale(1.02);}
    }
    @keyframes seatLoseFlash{
      0%{opacity:0;transform:scale(.99);} 22%{opacity:.95;transform:scale(1.00);} 100%{opacity:0;transform:scale(1.01);}
    }
    @keyframes seatShake{
      0%{transform:translateX(0);} 18%{transform:translateX(-6px);} 36%{transform:translateX(6px);}
      54%{transform:translateX(-4px);} 72%{transform:translateX(4px);} 100%{transform:translateX(0);}
    }

    *{box-sizing:border-box;}
    html,body{height:100%;}
    body{
      margin:0;
      background:
        radial-gradient(1200px 800px at 20% 20%, rgba(96,165,250,.10), transparent 55%),
        radial-gradient(1000px 800px at 80% 30%, rgba(34,197,94,.08),  transparent 55%),
        radial-gradient(900px  900px at 50% 90%, rgba(191,90,242,.10), transparent 60%),
        var(--bg);
      color:var(--ink);
      font-family:-apple-system,BlinkMacSystemFont,"Helvetica Neue",sans-serif;
      overflow:hidden;
      touch-action:manipulation;
      padding-top:calc(env(safe-area-inset-top) + 10px);
    }

    /* ===== TOPBAR ===== */
    .topbar{
      position:fixed; top:12px; left:12px; right:12px;
      display:flex; justify-content:space-between; align-items:flex-start; gap:10px;
      flex-wrap:wrap;
      padding:10px 12px;
      border-radius:18px;
      background:rgba(17,24,39,.55);
      border:1px solid rgba(255,255,255,.08);
      backdrop-filter:blur(10px);
      box-shadow:0 18px 60px rgba(0,0,0,.45);
      z-index:10;
    }
    .room{ font-weight:1000; letter-spacing:.10em; font-size:14px; flex:1 1 120px; min-width:120px; white-space:nowrap; }
    .status{
      display:flex; gap:8px; align-items:center; flex-wrap:wrap; justify-content:flex-end;
      font-weight:900; font-size:12.5px; color:var(--muted); letter-spacing:.06em;
      flex:1 1 260px;
    }
    .pill{
      display:inline-flex; align-items:center; gap:8px;
      padding:7px 10px; border-radius:999px;
      border:1px solid rgba(255,255,255,.10); background:rgba(2,6,23,.45);
      white-space:nowrap;
    }
    .dot{ width:8px; height:8px; border-radius:50%; background:#9ca3af; box-shadow:0 0 0 3px rgba(156,163,175,.15); }
    .dot.open  { background:#22c55e; box-shadow:0 0 0 3px rgba(34,197,94,.18), 0 0 16px rgba(34,197,94,.35); }
    .dot.closed{ background:#ef4444; box-shadow:0 0 0 3px rgba(239,68,68,.18), 0 0 16px rgba(239,68,68,.25); }

    /* ===== STAGE ===== */
    .stage{
      height:100%;
      display:flex; align-items:center; justify-content:center;
      padding:calc(var(--topbarH,66px) + 16px) 14px 18px;
    }

    /* ===== PADSHELL ===== */
    .padShell{
      width:min(520px,94vw);
      height:min(660px,80vh);
      border-radius:44px;
      background:
        radial-gradient(100% 120% at 50% 15%, rgba(255,255,255,.06), transparent 55%),
        linear-gradient(180deg, rgba(17,24,39,.92), rgba(2,6,23,.88));
      border:1px solid rgba(255,255,255,.10);
      box-shadow:var(--shadow);
      overflow:hidden;
      padding:16px;
      display:flex; flex-direction:column; gap:12px;
    }
    .padShell::before,.padShell::after{
      content:""; position:absolute;
      bottom:-22%; width:52%; height:54%; border-radius:60px;
      background:
        radial-gradient(90% 80% at 50% 10%, rgba(255,255,255,.05), transparent 60%),
        linear-gradient(180deg, rgba(255,255,255,.03), rgba(0,0,0,.22));
      border:1px solid rgba(255,255,255,.06);
      z-index:0; opacity:.85;
    }
    .padShell::before{ left:-22%; transform:rotate(10deg); }
    .padShell::after { right:-22%; transform:rotate(-10deg); }
    .padShell > *{ position:relative; z-index:1; }

    .hud{
      display:flex; justify-content:center; align-items:center; gap:10px;
      padding:10px 12px; border-radius:18px;
      background:rgba(2,6,23,.55); border:1px solid rgba(255,255,255,.08);
      letter-spacing:.10em; font-weight:1000; color:rgba(203,213,225,.92); text-align:center;
    }
    .hud strong{ color:#fff; letter-spacing:.12em; }

    .padArea{
      flex:1; min-height:0; border-radius:24px;
      background:rgba(2,6,23,.45); border:1px solid rgba(255,255,255,.08);
      padding:14px;
      display:flex; flex-direction:column; justify-content:center; align-items:center; gap:14px;
      overflow:hidden;
    }

    /* ===== FX ===== */
    .fxRing,.fxRing2{
      position:absolute; left:50%; top:50%;
      width:18px; height:18px; transform:translate(-50%,-50%);
      border-radius:999px; pointer-events:none; opacity:0; z-index:6;
      background:radial-gradient(circle, rgba(255,255,255,.95), rgba(255,255,255,0) 62%);
    }
    .fxRing2{
      width:16px; height:16px;
      background:radial-gradient(circle, rgba(168,85,247,.85), rgba(168,85,247,0) 62%);
      mix-blend-mode:screen; z-index:5; filter:blur(.4px);
    }
    .fxRing::after,.fxRing2::after{
      content:""; position:absolute; inset:-10px; border-radius:999px;
      border:2px solid rgba(255,255,255,.22); opacity:0;
    }
    .fxRing2::after{ border-color:rgba(168,85,247,.18); inset:-14px; border-width:3px; }

    .padShell.fx .fxRing { opacity:1; animation:ringPop  520ms cubic-bezier(.12,.9,.1,1) forwards; }
    .padShell.fx .fxRing::after { animation:ringOutline 520ms cubic-bezier(.12,.9,.1,1) forwards; }
    .padShell.fx .fxRing2{ opacity:1; animation:ringPop2 600ms cubic-bezier(.12,.9,.1,1) forwards; }
    .padShell.fx .fxRing2::after{ animation:ringOutline2 600ms cubic-bezier(.12,.9,.1,1) forwards; }

    @keyframes ringPop{
      0%{transform:translate(-50%,-50%) scale(.55);opacity:0;}
      12%{opacity:1;}
      65%{transform:translate(-50%,-50%) scale(12.5);opacity:.55;}
      100%{transform:translate(-50%,-50%) scale(16.0);opacity:0;}
    }
    @keyframes ringPop2{
      0%{transform:translate(-50%,-50%) scale(.5);opacity:0;}
      15%{opacity:1;}
      70%{transform:translate(-50%,-50%) scale(10.8);opacity:.45;}
      100%{transform:translate(-50%,-50%) scale(14.8);opacity:0;}
    }
    @keyframes ringOutline{
      0%{opacity:0;transform:scale(.55);}18%{opacity:.65;}70%{opacity:.35;transform:scale(13);}100%{opacity:0;transform:scale(16.5);}
    }
    @keyframes ringOutline2{
      0%{opacity:0;transform:scale(.5);}20%{opacity:.55;}72%{opacity:.28;transform:scale(11.6);}100%{opacity:0;transform:scale(15.4);}
    }

    /* trail */
    .trail{
      position:absolute; border-radius:999px; pointer-events:none; z-index:7;
      mix-blend-mode:screen; filter:blur(.2px); will-change:transform,opacity,filter;
    }
    .trail.t1{opacity:.55; animation:trail1 520ms cubic-bezier(.12,.9,.1,1) forwards;}
    .trail.t2{opacity:.35; animation:trail2 560ms cubic-bezier(.12,.9,.1,1) forwards;}
    @keyframes trail1{
      0%{transform:translate(0,0) scale(1) rotate(0deg);opacity:.55;}
      35%{transform:translate(6px,10px) scale(.78) rotate(180deg);opacity:.48;}
      70%{transform:translate(12px,22px) scale(.28) rotate(520deg);opacity:.22;}
      100%{transform:translate(18px,34px) scale(.06) rotate(900deg);opacity:0;}
    }
    @keyframes trail2{
      0%{transform:translate(-2px,2px) scale(1) rotate(0deg);opacity:.35;}
      40%{transform:translate(4px,14px) scale(.72) rotate(210deg);opacity:.28;}
      75%{transform:translate(10px,26px) scale(.22) rotate(620deg);opacity:.14;}
      100%{transform:translate(16px,38px) scale(.05) rotate(980deg);opacity:0;}
    }

    /* ===== BUTTONS ===== */
    .btn{
      -webkit-tap-highlight-color:transparent;
      appearance:none; border:none; cursor:pointer; user-select:none; outline:none;
      width:84px; height:84px; border-radius:999px;
      font-weight:1100; font-size:30px; letter-spacing:.06em;
      background:rgba(255,255,255,.88);
      box-shadow:
        inset 0 10px 18px rgba(255,255,255,.35),
        inset 0 -14px 18px rgba(0,0,0,.18),
        0 18px 40px rgba(0,0,0,.55);
      transform:translateY(0);
      transition:transform .10s ease,filter .12s ease,box-shadow .12s ease,opacity .15s ease;
      position:relative; will-change:transform,opacity;
    }
    .btn::after{
      content:""; position:absolute; inset:10px; border-radius:999px;
      background:radial-gradient(circle at 30% 25%, rgba(255,255,255,.55), rgba(255,255,255,0) 55%);
      opacity:.85; pointer-events:none;
    }
    .btn:active{
      transform:translateY(3px) scale(.985); filter:brightness(.98);
      box-shadow:inset 0 10px 18px rgba(255,255,255,.25),inset 0 -14px 18px rgba(0,0,0,.25),0 10px 24px rgba(0,0,0,.55);
    }
    .btn.sel{
      box-shadow:0 0 0 3px rgba(255,255,255,.24),0 0 0 10px rgba(255,255,255,.10),0 0 36px rgba(255,255,255,.16),0 18px 40px rgba(0,0,0,.55);
      transform:translateY(-2px) scale(1.05);
    }
    .btn.sucked{ pointer-events:none; animation:suckIn 520ms cubic-bezier(.12,.9,.1,1) forwards; }
    @keyframes suckIn{
      0%{transform:translateY(-2px) scale(1.05) rotate(0deg);opacity:1;filter:blur(0);}
      18%{transform:translateY(1px) scale(.90) rotate(180deg);opacity:1;filter:blur(.2px);}
      50%{transform:translateY(12px) scale(.42) rotate(540deg);opacity:.70;filter:blur(1px);}
      80%{transform:translateY(24px) scale(.12) rotate(980deg);opacity:.25;filter:blur(1.6px);}
      100%{transform:translateY(32px) scale(.05) rotate(1260deg);opacity:0;filter:blur(2.1px);}
    }

    .btn.O{ background:var(--color-o); color:#0b1020; }
    .btn.X{ background:var(--color-x); color:#fff; }
    .btn.A{ background:var(--color-a); color:#fff; }
    .btn.B{ background:var(--color-b); color:#0b1020; }
    .btn.C{ background:var(--color-c); color:#0b1020; }
    .btn.D{ background:var(--color-d); color:#fff; }
    .btn.E{ background:var(--color-e); color:#fff; }

    /* OX grid */
    .oxGrid{ display:grid; grid-template-columns:1fr 1fr; gap:14px; align-items:center; justify-items:center; }
    .oxGrid .btn{ width:112px; height:112px; font-size:44px; }

    /* 5択 ダイヤ配置 */
    .fiveGrid{
      width:min(320px,100%); max-width:320px; margin:0 auto;
      aspect-ratio:1.15/1;
      display:grid; grid-template-columns:1fr 1fr 1fr; grid-template-rows:1fr 1fr 1fr;
      gap:12px; align-items:center; justify-items:center;
    }
    .posD{ grid-column:2; grid-row:1; }
    .posB{ grid-column:2; grid-row:3; }
    .posC{ grid-column:1; grid-row:2; }
    .posA{ grid-column:3; grid-row:2; }
    .posE{ grid-column:2; grid-row:2; width:92px; height:92px; font-size:32px; }

    /* text */
    .textWrap{
      width:min(420px,88vw);
      display:flex; flex-direction:column; gap:10px;
      padding:14px; border-radius:22px;
      background:rgba(0,0,0,.18); border:1px solid rgba(255,255,255,.10);
      box-shadow:0 18px 44px rgba(0,0,0,.25);
    }
    .textTitle{
      font-weight:1000; letter-spacing:.10em; color:rgba(203,213,225,.92);
      font-size:13px; display:flex; justify-content:space-between; align-items:center; gap:10px;
    }
    .counter{ font-weight:900; color:rgba(203,213,225,.85); letter-spacing:.06em; font-size:12px; }
    textarea{
      width:100%; min-height:150px; max-height:240px; resize:none;
      padding:12px; border-radius:16px;
      border:1px solid rgba(255,255,255,.10); background:rgba(0,0,0,.25);
      color:#fff; font-size:18px; line-height:1.4; outline:none;
    }
    textarea:focus{ border-color:rgba(255,255,255,.22); box-shadow:0 0 0 4px rgba(255,255,255,.08); }
    .hint{ color:rgba(203,213,225,.80); font-size:12px; line-height:1.45; }

    /* submit */
    .submit{
      width:min(340px,90vw); height:64px; border-radius:999px;
      border:1px solid rgba(255,255,255,.12);
      background:
        radial-gradient(circle at 20% 20%, rgba(255,255,255,.15), transparent 50%),
        linear-gradient(180deg, rgba(99,102,241,.90), rgba(168,85,247,.90));
      color:#fff; font-weight:1100; font-size:18px; letter-spacing:.12em;
      box-shadow:0 18px 40px rgba(139,92,246,.35),0 18px 60px rgba(0,0,0,.55);
      cursor:pointer; transition:transform .10s ease,filter .12s ease,opacity .15s ease;
    }
    .submit:active{ transform:translateY(2px); filter:brightness(.98); }
    .submit:disabled{ opacity:.45; cursor:not-allowed; filter:grayscale(.2); }
    .locked{ opacity:.55; pointer-events:none; filter:grayscale(.15); }

    /* overlay */
    .overlay{
      position:absolute; inset:0; border-radius:24px; overflow:hidden;
      display:flex; align-items:center; justify-content:center; padding:22px; text-align:center;
      background:rgba(0,0,0,.42); backdrop-filter:blur(10px);
      opacity:0; pointer-events:none; transition:opacity .18s ease; z-index:30;
    }
    .overlay.show{ opacity:1; pointer-events:auto; }
    .overlayCard{
      width:min(520px,92vw); border-radius:26px;
      padding:18px 16px; background:rgba(17,24,39,.72);
      border:1px solid rgba(255,255,255,.10); box-shadow:0 24px 80px rgba(0,0,0,.65);
    }
    .overlayCard h3{ margin:0 0 8px 0; letter-spacing:.10em; font-weight:1100; font-size:18px; }
    .overlayCard p{ margin:0; color:rgba(203,213,225,.9); line-height:1.5; font-size:14px; }

    /* toast */
    .toast{
      position:fixed; left:50%; bottom:16px; transform:translateX(-50%);
      background:rgba(17,24,39,.92); border:1px solid rgba(255,255,255,.12);
      padding:10px 14px; border-radius:999px; box-shadow:0 18px 50px rgba(0,0,0,.55);
      color:#f9fafb; font-weight:1000; letter-spacing:.10em;
      opacity:0; pointer-events:none; transition:opacity .18s ease; z-index:50; white-space:nowrap;
    }
    .toast.show{ opacity:1; }

    #buildTag{
      position:fixed; right:10px; bottom:10px;
      opacity:.55; font-size:12px; z-index:60;
      background:rgba(0,0,0,.35); border:1px solid rgba(255,255,255,.08);
      padding:6px 10px; border-radius:999px; backdrop-filter:blur(8px);
      pointer-events:none;
    }
    @media(max-height:640px){
      .padShell{ height:min(660px,84vh); }
      .btn{ width:76px; height:76px; }
      .oxGrid .btn{ width:98px; height:98px; font-size:40px; }
      .posE{ width:86px; height:86px; }
      textarea{ min-height:130px; }
    }
  </style>
</head>

<body>
  <div id="buildTag">build: 2026-03-01 / exp-display-v2 / student</div>

  <div class="topbar">
    <div class="room" id="roomLabel">ROOM: -</div>
    <div class="status">
      <span class="pill"><span id="dot" class="dot"></span><span id="statusText">status: -</span></span>
      <span class="pill" id="modeText">mode: -</span>
      <span class="pill" id="meTag">me: -</span>
    </div>
  </div>

  <div class="stage">
    <div class="padShell" id="padShell">
      <div class="hud">
        <span>回答モード：</span><strong id="hudMode">待機</strong>
      </div>

      <div class="padArea" id="padArea">
        <div class="fxRing"  id="fxRing"></div>
        <div class="fxRing2" id="fxRing2"></div>

        <div id="answer-container"></div>
        <button id="submitBtn" class="submit" disabled>START（決定）</button>

        <div id="overlay" class="overlay">
          <div class="overlayCard">
            <h3>待機中</h3>
            <p id="overlayText">先生が出題を開始すると、解答ボタンが使えるようになります。</p>
          </div>
        </div>
      </div>
    </div>
  </div>

  <div id="toast" class="toast">送信しました ✓</div>

  <script type="module">
    import { initializeApp }  from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
    import {
      getDatabase, ref, onValue, set, runTransaction
    } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";

    const firebaseConfig = {
      apiKey: "AIzaSyBke-wTU16skpbK8z80ddK04tE154dHERQ",
      databaseURL: "https://satosan-41eac-default-rtdb.asia-southeast1.firebasedatabase.app",
      projectId: "satosan-41eac"
    };
    const app = initializeApp(firebaseConfig);
    const db  = getDatabase(app);

    const url         = new URL(location.href);
    const room        = url.searchParams.get("room") || "kyoto-01";
    const urlSession  = url.searchParams.get("s")    || "";

    // ===== DOM =====
    const padShell   = document.getElementById("padShell");
    const padArea    = document.getElementById("padArea");
    const dot        = document.getElementById("dot");
    const statusText = document.getElementById("statusText");
    const modeText   = document.getElementById("modeText");
    const hudMode    = document.getElementById("hudMode");
    const submitBtn  = document.getElementById("submitBtn");
    const container  = document.getElementById("answer-container");
    const overlay    = document.getElementById("overlay");
    const overlayText= document.getElementById("overlayText");
    const toast      = document.getElementById("toast");

    document.getElementById("roomLabel").textContent=`ROOM: ${room}`;

    // ===== userId =====
    let userId=localStorage.getItem("student_user_id");
    if(!userId){
      userId="user_"+Math.random().toString(36).slice(2,10);
      localStorage.setItem("student_user_id",userId);
    }

    // ===== me identity =====
    function hash32(s){
      let h=2166136261;
      for(let i=0;i<s.length;i++){ h^=s.charCodeAt(i); h=Math.imul(h,16777619); }
      return (h>>>0);
    }
    const EMOJIS=["🐶","🐱","🐼","🦊","🐸","🐵","🐯","🐰","🐨","🦁","🐮","🐷","🐧","🐻","🐹","🦄"];
    const COLORS=["#60a5fa","#34d399","#f59e0b","#a78bfa","#fb7185","#22c55e","#38bdf8","#f472b6"];
    function getOrCreateMe(){
      const saved={
        emoji:localStorage.getItem("cs_me_emoji"),
        tag:  localStorage.getItem("cs_me_tag"),
        color:localStorage.getItem("cs_me_color")
      };
      if(saved.emoji&&saved.tag&&saved.color) return saved;
      const h=hash32(userId);
      const emoji=EMOJIS[h%EMOJIS.length];
      const tag=`ID-${String(h%90+10).padStart(2,"0")}`;
      const color=COLORS[h%COLORS.length];
      localStorage.setItem("cs_me_emoji",emoji);
      localStorage.setItem("cs_me_tag",tag);
      localStorage.setItem("cs_me_color",color);
      return {emoji,tag,color};
    }
    const me=getOrCreateMe();
    document.getElementById("meTag").textContent=`me: ${me.emoji} ${me.tag}`;

    // roster公開
    set(ref(db,`rooms/${room}/activity/roster/${userId}`),{
      emoji:me.emoji, tag:me.tag, color:me.color, at:Date.now()
    }).catch(()=>{});

    // ===== state =====
    let isOpen=false, currentMode=null, currentView="quiz";
    let selected=null, sending=false, textValue="";
    let isGame=false, gameRound=null, gamePhase=null;
    let gameSeatsRemain={A:0,B:0,C:0,D:0,E:0};
    let mySeat=null, claimBusy=false;
    let seatFxRound=-1, seatFxDone=false;
    let currentPhase="qr";

    // ===== UI helpers =====
    function showToast(msg){
      toast.textContent=msg;
      toast.classList.add("show");
      setTimeout(()=>toast.classList.remove("show"),1200);
    }
    function setOverlay(show,msg){
      overlay.classList.toggle("show",!!show);
      if(msg) overlayText.textContent=msg;
    }
    function clearTrails(){ padArea.querySelectorAll(".trail").forEach(e=>e.remove()); }
    function lockUI(){
      container.classList.add("locked"); submitBtn.disabled=true;
    }
    function unlockUI(){
      sending=false; padShell.classList.remove("fx");
      container.classList.remove("locked"); submitBtn.disabled=true;
      selected=null; textValue=""; clearTrails();
      container.style.pointerEvents="";
      container.querySelectorAll(".btn").forEach(b=>b.classList.remove("sel","sucked"));
      container.querySelectorAll(".btn").forEach(b=>b.style.opacity="");
    }
    function uiLabel(ch){
      const c=String(ch).trim().toUpperCase();
      return c==="O"?"○":c==="X"?"✕":c;
    }
    function haptic(){ try{if(navigator.vibrate)navigator.vibrate(18);}catch(_){} }
    function normKey(k){ return String(k||"").trim().toUpperCase(); }

    // ===== seat FX =====
    const SEAT_COLORS={A:"var(--color-a)",B:"var(--color-b)",C:"var(--color-c)",D:"var(--color-d)",E:"var(--color-e)"};
    function resetSeatFxIfNeeded(){
      const r=(gameRound==null)?-1:Number(gameRound);
      if(seatFxRound!==r){seatFxRound=r;seatFxDone=false;}
    }
    function fireSeatWinFx(seat){
      resetSeatFxIfNeeded();
      if(seatFxDone) return;
      seatFxDone=true;
      padShell.style.setProperty("--seat-flash",SEAT_COLORS[seat]||"var(--color-a)");
      padShell.classList.remove("seatLose"); padShell.classList.add("seatWin");
      setTimeout(()=>padShell.classList.remove("seatWin"),700);
      if(navigator.vibrate) navigator.vibrate(35);
    }
    function fireSeatLoseFx(){
      padShell.classList.remove("seatWin"); padShell.classList.add("seatLose");
      setTimeout(()=>padShell.classList.remove("seatLose"),520);
      if(navigator.vibrate) navigator.vibrate([60,40,60]);
    }

    // ===== game HUD line =====
    let gameLineEl=null;
    function ensureGameLine(){
      if(gameLineEl) return gameLineEl;
      gameLineEl=document.createElement("div");
      gameLineEl.id="gameLine";
      Object.assign(gameLineEl.style,{
        margin:"0 16px",padding:"10px 12px",borderRadius:"16px",
        background:"rgba(2,6,23,.40)",border:"1px solid rgba(255,255,255,.08)",
        color:"rgba(203,213,225,.92)",fontWeight:"1000",letterSpacing:".08em",fontSize:"12px"
      });
      document.querySelector(".hud")?.insertAdjacentElement("afterend",gameLineEl);
      return gameLineEl;
    }
    function setGameLine(text){
      const el=ensureGameLine();
      el.textContent=text;
      el.style.display=isGame?"block":"none";
    }
    function getRemainMap(game){
      const g=game||{};
      const src=(g.seatsRemain&&typeof g.seatsRemain==="object")?g.seatsRemain
               :(g.seats&&typeof g.seats==="object")?g.seats:null;
      const out={A:0,B:0,C:0,D:0,E:0};
      if(!src) return out;
      ["A","B","C","D","E"].forEach(k=>out[k]=Math.max(0,Math.floor(Number(src[k]||0))));
      return out;
    }
    function updateGameButtonsAvailability(){
      container.querySelectorAll(".btn").forEach(btn=>{
        const key=btn.dataset?.choice||"";
        btn.style.display=mySeat?(key===mySeat?"":"none"):"";
      });
    }
    function updateGameLine(){
      if(!isGame){setGameLine("");return;}
      const r=gameSeatsRemain||{A:0,B:0,C:0,D:0,E:0};
      const remainText=`残席 A${r.A} B${r.B} C${r.C} D${r.D} E${r.E}`;
      const meText=mySeat?` / あなた: ${mySeat}`:"";
      const ph=gamePhase?` / phase:${gamePhase}`:"";
      setGameLine(remainText+meText+ph);
    }

    // ===== button factory =====
    function createChoiceButton(ch,onPress){
      const c=normKey(ch);
      const btn=document.createElement("button");
      btn.className=`btn ${c}`; btn.type="button";
      btn.textContent=uiLabel(c); btn.dataset.choice=c;
      btn.onclick=()=>onPress?.(c,btn);
      return btn;
    }

    // ===== render: OX =====
    function renderOX(choices){
      isGame=false; submitBtn.style.display="block";
      unlockUI(); container.innerHTML="";
      hudMode.textContent="○✕"; modeText.textContent="mode: ox"; setGameLine("");
      const grid=document.createElement("div"); grid.className="oxGrid";
      const onPress=(c,btn)=>{
        if(!isOpen||sending) return;
        selected=c; haptic();
        container.querySelectorAll(".btn").forEach(b=>b.classList.remove("sel"));
        btn.classList.add("sel"); submitBtn.disabled=false;
      };
      (choices||["O","X"]).forEach(ch=>grid.appendChild(createChoiceButton(ch,onPress)));
      container.appendChild(grid);
      submitBtn.textContent="START（決定）"; submitBtn.disabled=true;
    }

    // ===== render: Five =====
    function renderFive(choices){
      isGame=false; submitBtn.style.display="block";
      unlockUI(); container.innerHTML="";
      hudMode.textContent="5択"; modeText.textContent="mode: five"; setGameLine("");
      const grid=document.createElement("div"); grid.className="fiveGrid";
      const order=(choices&&choices.length)?choices:["A","B","C","D","E"];
      const posClass={A:"posA",B:"posB",C:"posC",D:"posD",E:"posE"};
      const onPress=(c,btn)=>{
        if(!isOpen||sending) return;
        selected=c; haptic();
        container.querySelectorAll(".btn").forEach(b=>b.classList.remove("sel"));
        btn.classList.add("sel"); submitBtn.disabled=false;
      };
      order.forEach(ch=>{
        const c=normKey(ch); const btn=createChoiceButton(c,onPress);
        btn.classList.add(posClass[c]||""); grid.appendChild(btn);
      });
      container.appendChild(grid);
      submitBtn.textContent="START（決定）"; submitBtn.disabled=true;
    }

    // ===== render: Text =====
    function renderText(){
      isGame=false; submitBtn.style.display="block";
      unlockUI(); container.innerHTML="";
      hudMode.textContent="文字入力"; modeText.textContent="mode: text"; setGameLine("");
      const wrap=document.createElement("div"); wrap.className="textWrap";
      const title=document.createElement("div"); title.className="textTitle";
      title.innerHTML=`<span>テキストを入力</span><span class="counter" id="counter">0/200</span>`;
      const ta=document.createElement("textarea");
      ta.placeholder="短くでOK（1〜2文）"; ta.maxLength=200; ta.disabled=!isOpen;
      const hint=document.createElement("div"); hint.className="hint";
      hint.textContent="※ 送信は1回。先生が「解答終了」を押した後に投影で公開されます。";
      wrap.appendChild(title); wrap.appendChild(ta); wrap.appendChild(hint);
      container.appendChild(wrap);
      const counterEl=wrap.querySelector("#counter");
      const refresh=()=>{
        textValue=ta.value||"";
        counterEl.textContent=`${textValue.length}/200`;
        submitBtn.disabled=(!isOpen)||sending||(textValue.trim().length===0);
      };
      ta.addEventListener("input",refresh); refresh();
      submitBtn.textContent="SEND（送信）"; submitBtn.disabled=true;
      if(isOpen) setTimeout(()=>{try{ta.focus();}catch(_){}},50);
    }

    // ===== render: Game =====
    function renderGameFive(){
      isGame=true; submitBtn.style.display="none";
      unlockUI(); mySeat=null; claimBusy=false;
      container.innerHTML="";
      hudMode.textContent=`GAME${gameRound!=null?` R${gameRound}`:""}`;
      modeText.textContent="mode: game(A-E)";
      const grid=document.createElement("div"); grid.className="fiveGrid";
      const order=["A","B","C","D","E"];
      const posClass={A:"posA",B:"posB",C:"posC",D:"posD",E:"posE"};
      const onPress=async(c,btn)=>{
        if(!isGame||!isOpen||mySeat!=null||claimBusy) return;
        const rem=Number(gameSeatsRemain[c]||0);
        if(rem<=0){showToast(`${c} は満席！`);return;}
        haptic(); claimBusy=true; updateGameButtonsAvailability();
        set(ref(db,`rooms/${room}/answers/${userId}`),{value:c,timestamp:Date.now(),game:true}).catch(()=>{});
        const okSeat=await claimSeatTransaction(c);
        claimBusy=false;
        if(okSeat){mySeat=okSeat;showToast(`${okSeat} に座れた！`);fireSeatWinFx(okSeat);lockUI();}
        else{showToast("取れなかった！別の椅子へ");fireSeatLoseFx();}
        updateGameButtonsAvailability(); updateGameLine();
      };
      order.forEach(ch=>{
        const btn=createChoiceButton(ch,onPress);
        btn.classList.add(posClass[ch]||""); grid.appendChild(btn);
      });
      container.appendChild(grid);
      updateGameButtonsAvailability(); updateGameLine();
    }

    // ===== claim seat (transaction) =====
    async function claimSeatTransaction(choiceKey){
      const k=normKey(choiceKey);
      if(!["A","B","C","D","E"].includes(k)) return null;
      try{
        const res=await runTransaction(ref(db,`rooms/${room}/activity/game`),game=>{
          if(!game||typeof game!=="object") return;
          const phase=String(game.phase||"").trim();
          if(phase&&phase!=="open"&&phase!=="running") return;
          const round=Number(game.round||0);
          game.players??={};
          const cur=game.players[userId];
          if(cur&&Number(cur.round||0)===round&&cur.seat) return;
          const hasR=(game.seatsRemain&&typeof game.seatsRemain==="object");
          const hasS=(game.seats&&typeof game.seats==="object");
          if(!hasR&&!hasS) return;
          const target=hasR?"seatsRemain":"seats";
          game[target]??={A:0,B:0,C:0,D:0,E:0};
          const remain=Math.max(0,Math.floor(Number(game[target][k]||0)));
          if(remain<=0) return;
          game[target][k]=remain-1;
          game.players[userId]={seat:k,round,at:Date.now()};
          return game;
        });
        const g=res.snapshot.val();
        const p=g?.players?.[userId];
        if(!p) return null;
        if(Number(p.round||0)!==Number(gameRound||0)) return null;
        const seat=normKey(p.seat);
        if(!["A","B","C","D","E"].includes(seat)) return null;
        if(seat!==k) return null;
        return seat;
      }catch(e){
        console.warn("[game] claim failed:",e); return null;
      }
    }

    // ===== FX: submit =====
    function makeTrailClone(selBtn,klass){
      const ar=padArea.getBoundingClientRect();
      const r=selBtn.getBoundingClientRect();
      const clone=selBtn.cloneNode(true);
      clone.classList.remove("sel"); clone.classList.add("trail",klass);
      clone.style.cssText+=`;left:${r.left-ar.left}px;top:${r.top-ar.top}px;width:${r.width}px;height:${r.height}px;position:absolute;box-shadow:0 0 0 2px rgba(255,255,255,.14),0 0 18px rgba(255,255,255,.18),0 18px 40px rgba(0,0,0,.35)`;
      padArea.appendChild(clone);
      clone.addEventListener("animationend",()=>clone.remove());
    }
    function playSubmitFX(){
      const selBtn=container.querySelector(".btn.sel");
      if(!selBtn) return;
      clearTrails(); padShell.classList.add("fx");
      makeTrailClone(selBtn,"t2"); makeTrailClone(selBtn,"t1");
      selBtn.classList.add("sucked");
      container.querySelectorAll(".btn").forEach(b=>{if(b!==selBtn)b.style.opacity="0.50";});
      setTimeout(()=>padShell.classList.remove("fx"),650);
    }

    // ===== submit =====
    submitBtn.onclick=async()=>{
      if(isGame||!isOpen||sending) return;
      let payload=null;
      if(currentMode==="ox"||currentMode==="five"){
        if(!selected) return;
        payload={value:selected,timestamp:Date.now()};
        sending=true; submitBtn.disabled=true;
        container.style.pointerEvents="none"; playSubmitFX();
      }else if(currentMode==="text"){
        const text=(textValue||"").trim();
        if(!text) return;
        payload={value:text,timestamp:Date.now()};
        sending=true; submitBtn.disabled=true;
        container.style.pointerEvents="none";
      }else return;
      try{
        await set(ref(db,`rooms/${room}/answers/${userId}`),payload);
      }catch(e){
        sending=false; container.style.pointerEvents="";
        showToast("送信失敗…もう一度");
        if(currentMode==="text") renderText();
        if(currentMode==="ox")   renderOX(["O","X"]);
        if(currentMode==="five") renderFive(["A","B","C","D","E"]);
        return;
      }
      setTimeout(()=>{
        container.style.pointerEvents="";
        showToast("送信しました ✓"); lockUI();
      },(currentMode==="ox"||currentMode==="five")?560:220);
    };

    // ===== re-render diff keys =====
    let lastStatus=null,lastMode=null,lastView=null,lastConfigKey="";
    function makeConfigKey(mode,config){
      if(mode==="text") return "text";
      const arr=Array.isArray(config?.choices)?config.choices:[];
      return arr.map(x=>String(x).trim().toUpperCase()).join(",");
    }

    // ===== phase subscription（v2） =====
    onValue(ref(db,`rooms/${room}/quiz/present/phase`),snap=>{
      currentPhase=snap.val()||"standby";

      if(currentPhase==="qr"){
        // QR表示中：完全ロック
        isOpen=false; lockUI();
        setOverlay(true,"QRコードで参加してください。");
        // 状態をリセット（次の出題に備える）
        lastStatus=null; lastMode=null; lastView=null; lastConfigKey="";
      } else if(currentPhase==="media"){
        // メディア表示中：ロック
        isOpen=false; lockUI();
        setOverlay(true,"映像・画像を表示中です。先生の指示をお待ちください。");
      } else if(currentPhase==="standby"){
        // スタンバイ：ロックを解除して待機画面に
        isOpen=false; lockUI();
        container.classList.remove("locked");
        unlockUI();
        setOverlay(true,"先生の操作を待っています…");
        hudMode.textContent="待機";
        modeText.textContent="mode: -";
        container.innerHTML="";
        submitBtn.style.display="block"; submitBtn.disabled=true;
        // 再描画フラグリセット（次の出題で必ず再描画させる）
        lastStatus=null; lastMode=null; lastView=null; lastConfigKey="";
      } else if(currentPhase==="question"){
        // 問題表示フェーズ：overlay を「回答待ち」に更新
        // isOpen の詳細は activity監視が決めるが、まず解説モードのオーバーレイをリセット
        if(!isOpen){
          setOverlay(true,"先生の操作を待っています…");
        }
        // 再描画フラグリセット（前問の closed 状態が残らないように）
        lastStatus=null; lastMode=null; lastView=null; lastConfigKey="";
      }
      // explain / game は activity監視が制御
    });

    // ===== activity subscription =====
    onValue(ref(db,`rooms/${room}/activity`),data=>{
      const d=data.val()||{};

      const session=String(d.session||"");
      if(session!==""&&urlSession!==""&&session!==urlSession){
        isOpen=false; lockUI();
        setOverlay(true,"本日のQRから参加してください。"); return;
      }

      const status=d.status||"-";
      const mode=d.mode||null;
      const view=d.view||"quiz";
      const config=d.config||{};
      const game=d.game||null;

      currentMode=mode; currentView=view;
      isGame=(view==="game");
      gameRound=(game&&game.round!=null)?Number(game.round):null;
      gamePhase=(game&&game.phase!=null)?String(game.phase):null;
      gameSeatsRemain=getRemainMap(game);

      const quizInputOpen=(status==="open");
      const gameInputOpen=(view==="game")&&(gamePhase==="open"||gamePhase==="running");
      isOpen=isGame?gameInputOpen:quizInputOpen;

      statusText.textContent=isGame?`status: ${status} / phase: ${gamePhase||"-"}`:`status: ${status}`;
      dot.classList.toggle("open",isOpen);
      dot.classList.toggle("closed",!isOpen);

      // DB側でseatが確定済みなら反映
      if(isGame&&game?.players?.[userId]){
        const p=game.players[userId];
        const pr=Number(p.round||0);
        const seat=String(p.seat||"").trim().toUpperCase();
        if(gameRound!=null&&pr===Number(gameRound)&&["A","B","C","D","E"].includes(seat)){
          if(mySeat!==seat){
            mySeat=seat; fireSeatWinFx(seat); lockUI();
            updateGameButtonsAvailability(); updateGameLine();
          }
        }
      }

      // overlay
      if(!isOpen){
        let msg="先生の操作を待っています…";
        if(status==="closed"){
          if(isGame){
            if(gamePhase==="music") msg="♪ 音楽中…『ストップ』で押せるようになります。";
            else if(gamePhase==="reveal") msg="ラウンド終了！次のラウンドを待ってください。";
            else msg="このラウンドは締切！次のラウンドを待ってください。";
          }else{
            msg="解答は締切です。先生の次の操作を待ってください。";
          }
        }
        setOverlay(true,msg);
      }else{
        setOverlay(false);
      }

      const cfgKey=makeConfigKey(mode,config);
      const shouldRe=(status!==lastStatus)||(mode!==lastMode)||(view!==lastView)||(cfgKey!==lastConfigKey);

      if(!shouldRe){
        if(isGame){
          const prevRound=Number(container.dataset.gameRound||"NaN");
          if(!Number.isNaN(gameRound)&&gameRound!==prevRound){
            container.dataset.gameRound=String(gameRound);
            renderGameFive(); updateGameButtonsAvailability(); updateGameLine(); return;
          }
          updateGameButtonsAvailability(); updateGameLine(); return;
        }
        const ta=container.querySelector("textarea");
        if(ta){
          ta.disabled=(!isOpen)||container.classList.contains("locked");
          submitBtn.disabled=(!isOpen)||sending||container.classList.contains("locked")||((textValue||"").trim().length===0);
        }else{
          if(!isOpen) submitBtn.disabled=true;
        }
        return;
      }

      lastStatus=status; lastMode=mode; lastView=view; lastConfigKey=cfgKey;

      if(view==="game"){
        container.dataset.gameRound=(gameRound!=null?String(gameRound):"");
        renderGameFive(); updateGameButtonsAvailability(); updateGameLine(); return;
      }
      if(currentMode==="ox")   return renderOX(config.choices||["O","X"]);
      if(currentMode==="five") return renderFive(config.choices||["A","B","C","D","E"]);
      if(currentMode==="text") return renderText();

      hudMode.textContent="待機";
      modeText.textContent=`mode: ${currentMode||"-"}`;
      container.innerHTML=""; submitBtn.style.display="block"; submitBtn.disabled=true;
      setOverlay(true,"先生が出題を開始すると、解答ボタンが使えるようになります。");
    });

    // topbar inset
    function updateTopbarInset(){
      const tb=document.querySelector(".topbar");
      if(!tb) return;
      document.documentElement.style.setProperty("--topbarH",(tb.offsetHeight||66)+"px");
    }
    updateTopbarInset();
    requestAnimationFrame(updateTopbarInset);
    setTimeout(updateTopbarInset,200);
    window.addEventListener("resize",updateTopbarInset);
  </script>
</body>
</html>
