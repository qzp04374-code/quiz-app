<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>ClassSync v2 - Display</title>
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getDatabase, ref, onValue } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

const firebaseConfig = { /* 既存設定 */ };
const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

const url = new URL(location.href);
const room = url.searchParams.get("room") || "kyoto-01";

let phase="qr";
let qid="";
let question=null;

onValue(ref(db, `rooms/${room}/quiz/present/phase`), snap=>{
  phase=snap.val()||"qr";
  render();
});

onValue(ref(db, `rooms/${room}/quiz/current_question_id`), snap=>{
  qid=snap.val();
  if(qid){
    onValue(ref(db, `rooms/${room}/questions/${qid}`), qs=>{
      question=qs.val();
      render();
    });
  }
});

function render(){
  const root=document.getElementById("root");
  root.innerHTML="";

  if(phase==="media") return showMedia(root);
  if(phase==="game") return location.href="game.html?room="+room;

  if(question){
    const h=document.createElement("h2");
    h.textContent=question.question;
    root.appendChild(h);
  }
}

function showMedia(root){
  if(!question?.media) return;

  if(question.media.type==="image"){
    const img=document.createElement("img");
    img.src=question.media.url;
    img.style.width="100%";
    img.style.height="80vh";
    img.style.objectFit="contain";
    root.appendChild(img);
  }

  if(question.media.type==="video"){
    const v=document.createElement("video");
    v.src=question.media.url;
    v.autoplay=true;
    v.muted=true;
    v.playsInline=true;
    v.style.width="100%";
    v.style.height="80vh";
    v.style.objectFit="contain";
    root.appendChild(v);
  }
}
</script>

<style>
body{margin:0;text-align:center;font-family:sans-serif}
h2{font-size:clamp(2rem,4vw,4rem)}
</style>
</head>
<body>
<div id="root"></div>
</body>
</html>
