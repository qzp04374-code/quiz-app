<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
  <title>ClassSync v2 Display</title>
  <link rel="icon" href="data:,">
  <style>
    :root{
      --bg:#050608; --panel:rgba(17,24,39,.72); --line:rgba(255,255,255,.10);
      --ink:#f9fafb; --muted:rgba(203,213,225,.85); --shadow:0 1.4rem 5rem rgba(0,0,0,.70);
      --color-o:#34c759; --color-x:#ff3b30; --color-a:#0a84ff; --color-b:#30d158;
      --color-c:#ff9f0a; --color-d:#bf5af2; --color-e:#ff375f;
      --bar-track:rgba(255,255,255,.12); --bar-inset:rgba(255,255,255,.06);
      --count-color:#e5e7eb; --lab-color:var(--muted);
      /* 文字サイズ変数（JS で上書き） */
      --sz-q: 2.8rem;       /* 問題文 */
      --sz-choice: 1.5rem;  /* 選択肢 */
      --sz-text: 1.1rem;    /* テキスト回答 */
    }
    /* ===== ライトモード ===== */
    body.light-mode{
      --bg:#f0f2f5; --panel:rgba(255,255,255,.90); --line:rgba(0,0,0,.10);
      --ink:#111827; --muted:#4b5563; --shadow:0 4px 24px rgba(0,0,0,.10);
      --bar-track:rgba(0,0,0,.08); --bar-inset:rgba(0,0,0,.04);
      --count-color:#1f2937; --lab-color:#4b5563;
    }
    body.light-mode{
      background:var(--bg);
    }
    body.light-mode .topbar{ background:rgba(255,255,255,.75); }
    body.light-mode .panel{ background:rgba(255,255,255,.90); box-shadow:0 4px 24px rgba(0,0,0,.10); }
    body.light-mode #vchartWrap{ background:rgba(255,255,255,.80); border-color:rgba(0,0,0,.10); }
    body.light-mode .pill{ background:rgba(0,0,0,.06); border-color:rgba(0,0,0,.12); }
    body.light-mode .sBtn{ background:rgba(0,0,0,.06); border-color:rgba(0,0,0,.12); }
    body.light-mode #themeBtn{ background:rgba(255,255,255,.80); border-color:rgba(0,0,0,.14); color:#374151; }
    /* ===== テーマ切替ボタン ===== */
    #themeBtn{
      position:fixed; top:.5rem; left:50%; transform:translateX(-50%);
      background:rgba(2,6,23,.55); border:1px solid rgba(255,255,255,.16);
      color:rgba(203,213,225,.9); border-radius:999px; padding:.3rem 1rem;
      font-size:.72rem; font-weight:900; letter-spacing:.06em;
      cursor:pointer; user-select:none; z-index:9998;
      backdrop-filter:blur(8px); transition:background .2s,border-color .2s,color .2s;
    }
    /* ===== ID表示 ===== */
    .idToggleBtn{
      position:absolute; top:.5rem; right:.5rem;
      background:rgba(2,6,23,.55); border:1px solid rgba(255,255,255,.14);
      color:rgba(203,213,225,.9); border-radius:999px;
      padding:.25rem .65rem; font-size:.72rem; font-weight:900;
      cursor:pointer; user-select:none; z-index:10; transition:border-color .15s;
    }
    .idToggleBtn.on{ border-color:rgba(34,197,94,.5); color:#4ade80; }
    .idRow{
      display:flex; flex-wrap:wrap; gap:.25rem; margin-top:.3rem;
      max-height:0; overflow:hidden; opacity:0;
      transition:max-height .25s ease,opacity .2s ease;
    }
    .idRow.show{ max-height:120px; opacity:1; }
    .idChip{
      display:inline-flex; align-items:center; gap:.2rem;
      background:rgba(255,255,255,.08); border:1px solid rgba(255,255,255,.10);
      border-radius:999px; padding:.1rem .5rem;
      font-size:.68rem; font-weight:700; color:rgba(203,213,225,.85);
      white-space:nowrap;
    }
    .textIdChip{
      display:inline-flex; align-items:center; gap:.2rem;
      margin-left:.5rem; vertical-align:middle;
      background:rgba(255,255,255,.07); border:1px solid rgba(255,255,255,.18);
      border-radius:999px; padding:.05rem .45rem .05rem .3rem;
      font-size:.72em; font-weight:700; color:rgba(203,213,225,.8);
      white-space:nowrap; line-height:1.5;
    }
    *{box-sizing:border-box;}
    html,body{height:100%;margin:0;overflow:hidden;}
    body{
      background:radial-gradient(1100px 760px at 20% 20%,rgba(96,165,250,.10),transparent 55%),
        radial-gradient(900px 760px at 80% 30%,rgba(34,197,94,.08),transparent 55%),
        radial-gradient(820px 820px at 50% 90%,rgba(191,90,242,.10),transparent 60%),var(--bg);
      color:var(--ink);
      font-family:-apple-system,BlinkMacSystemFont,"Helvetica Neue",sans-serif;
    }
    .wrap{height:100%;display:flex;flex-direction:column;padding:.8rem .9rem .7rem;gap:.7rem;}
    .topbar{
      flex-shrink:0;display:flex;justify-content:space-between;align-items:center;gap:.6rem;flex-wrap:wrap;
      padding:.55rem .9rem;border-radius:1.1rem;background:rgba(2,6,23,.55);
      border:1px solid var(--line);backdrop-filter:blur(10px);
    }
    .room{font-weight:1000;letter-spacing:.10em;font-size:clamp(.85rem,1.4vw,1rem);white-space:nowrap;}
    .meta{display:flex;gap:.4rem;flex-wrap:wrap;align-items:center;}
    .pill{
      padding:.26rem .6rem;border-radius:999px;border:1px solid var(--line);
      background:rgba(17,24,39,.55);font-size:clamp(.65rem,1vw,.78rem);
      font-weight:900;letter-spacing:.06em;color:var(--muted);white-space:nowrap;
    }
    .pill.open{border-color:rgba(34,197,94,.4);background:rgba(34,197,94,.14);color:#4ade80;}
    .pill.closed{border-color:rgba(239,68,68,.35);background:rgba(239,68,68,.12);color:#f87171;}
    #timerBarWrap{width:110px;height:7px;border-radius:999px;background:rgba(255,255,255,.10);border:1px solid var(--line);overflow:hidden;}
    #timerBar{height:100%;width:0%;border-radius:999px;transition:width .2s linear;background:linear-gradient(90deg,rgba(34,197,94,.95),rgba(245,158,11,.95),rgba(239,68,68,.95));}
    body.timer-urgent #timerBar{animation:tpulse .6s infinite;}
    @keyframes tpulse{0%,100%{filter:brightness(1)}50%{filter:brightness(1.4)}}
    .sBtn{
      padding:.25rem .65rem;border-radius:999px;border:1px solid var(--line);
      background:rgba(255,255,255,.07);color:var(--muted);
      font-size:.7rem;font-weight:900;cursor:pointer;transition:filter .12s;white-space:nowrap;
    }
    .sBtn:hover{filter:brightness(1.2);}
    .sBtn.on{border-color:rgba(34,197,94,.45);background:rgba(34,197,94,.15);color:#4ade80;}
    .stage{flex:1;min-height:0;display:grid;grid-template-columns:2fr 1fr;gap:.8rem;}
    @media(max-width:900px){.stage{grid-template-columns:1fr;}}
    .panel{background:var(--panel);border:1px solid var(--line);border-radius:1.3rem;box-shadow:var(--shadow);overflow:hidden;min-height:0;}
    .left{padding:.9rem 1rem;display:flex;flex-direction:column;gap:.6rem;min-height:0;overflow:hidden;}
    body.closed .left{overflow:auto;}
    .q{font-size:var(--sz-q);font-weight:900;line-height:1.15;white-space:pre-wrap;flex-shrink:0;}
    .choices{display:grid;grid-template-columns:1fr;gap:.35rem;overflow-y:auto;flex:1;min-height:0;padding-right:.3rem;}
    .choice{display:flex;align-items:flex-start;gap:.55rem;padding:.42rem .7rem;border-radius:.85rem;background:rgba(2,6,23,.22);line-height:1.15;word-break:break-word;font-size:var(--sz-choice);}
    .choice.correct{border:2px solid rgba(34,197,94,.85);box-shadow:0 0 0 3px rgba(34,197,94,.15);}
    body.closed .choice.correct{animation:pulseGreen 1.3s infinite;}
    @keyframes pulseGreen{0%{box-shadow:0 0 0 0 rgba(34,197,94,.55);}70%{box-shadow:0 0 0 14px rgba(34,197,94,0);}100%{box-shadow:0 0 0 0 rgba(34,197,94,0);}}
    .badge{height:1.65em;min-width:2.35em;padding:0 .55em;border-radius:999px;display:inline-flex;align-items:center;justify-content:center;font-weight:1000;font-size:.98em;color:#0b1220;flex:0 0 auto;margin-top:.04em;}
    .badge.O{background:var(--color-o);}.badge.X{background:var(--color-x);color:#fff;}
    .badge.A{background:var(--color-a);color:#fff;}.badge.B{background:var(--color-b);}
    .badge.C{background:var(--color-c);}.badge.D{background:var(--color-d);color:#fff;}
    .badge.E{background:var(--color-e);color:#fff;}
    #answerBox{display:none;padding:.8rem 1rem;border-radius:1rem;background:rgba(2,6,23,.78);border:1px solid rgba(34,197,94,.45);flex-shrink:0;}
    #answerBox.show{display:block;}
    #answerLine{font-size:clamp(1.1rem,2.5vw,1.8rem);font-weight:1000;color:#22c55e;margin:0 0 .35rem;letter-spacing:.04em;}
    #explanationLine{margin:0;font-size:clamp(.85rem,1.7vw,1.25rem);line-height:1.45;color:#e5e7eb;white-space:pre-wrap;}
    .right{padding:.9rem;display:flex;flex-direction:column;gap:.55rem;min-height:0;}
    .rtitle{font-weight:1000;letter-spacing:.08em;font-size:clamp(.75rem,1.1vw,.88rem);color:var(--muted);flex-shrink:0;}
    #vchartWrap{flex:1;min-height:0;border-radius:1.1rem;background:rgba(2,6,23,.55);border:1px solid rgba(255,255,255,.08);padding:.8rem .65rem .5rem;display:flex;flex-direction:column;overflow:hidden;position:relative;}
    /* 横棒グラフ：上寄せ・固定行高 */
    #vchart{flex:0 0 auto;display:flex;flex-direction:column;justify-content:flex-start;gap:10px;padding:.3rem .2rem;min-height:0;}
    .col{width:100%;display:flex;flex-direction:row;align-items:center;gap:.55rem;min-height:0;height:44px;}
    .lab{font-size:clamp(.8rem,1.2vw,1rem);font-weight:1000;color:var(--lab-color,var(--muted));letter-spacing:.08em;flex:0 0 2rem;text-align:center;}
    .barTrack{flex:1;height:44px;border-radius:.55rem;background:var(--bar-track,rgba(255,255,255,.12));position:relative;overflow:hidden;box-shadow:inset 0 1px 0 var(--bar-inset,rgba(255,255,255,.06));}
    .bar{position:absolute;left:0;top:0;bottom:0;width:0%;border-radius:.55rem;transition:width .3s ease;opacity:.92;}
    .barFill{position:absolute;inset:0;opacity:.95;}
    .count{font-size:clamp(.65rem,1vw,.82rem);font-weight:1000;color:var(--count-color,#e5e7eb);flex:0 0 5.5rem;text-align:right;white-space:nowrap;}
    /* ===== RESULTS MASK ===== */
    .resultsMask{position:absolute;inset:0;border-radius:1.1rem;overflow:hidden;display:flex;align-items:center;justify-content:center;background:rgba(2,6,23,.92);backdrop-filter:blur(18px) brightness(.65);opacity:0;pointer-events:none;transition:opacity .18s ease;}
    .resultsMask.show{opacity:1;pointer-events:auto;}
    .maskFx{position:absolute;inset:-20%;z-index:0;pointer-events:none;opacity:.42;filter:blur(16px);animation:hueShift 10s linear infinite;}
    @keyframes hueShift{0%{filter:blur(18px) hue-rotate(0deg)}100%{filter:blur(18px) hue-rotate(18deg)}}
    .maskFx .blob{position:absolute;width:44vmax;height:44vmax;border-radius:999px;mix-blend-mode:screen;opacity:.22;}
    .maskFx .b1{left:-12%;top:10%;background:radial-gradient(circle at 30% 30%,rgba(10,132,255,.85),rgba(10,132,255,0) 60%);animation:bf1 7.2s ease-in-out infinite;}
    .maskFx .b2{right:-14%;top:18%;background:radial-gradient(circle at 30% 30%,rgba(48,209,88,.82),rgba(48,209,88,0) 60%);animation:bf2 8.2s ease-in-out infinite;}
    .maskFx .b3{left:10%;bottom:-18%;background:radial-gradient(circle at 30% 30%,rgba(191,90,242,.78),rgba(191,90,242,0) 62%);animation:bf3 9s ease-in-out infinite;}
    @keyframes bf1{0%,100%{transform:translate(-2%,0%) scale(1)}50%{transform:translate(8%,6%) scale(1.08)}}
    @keyframes bf2{0%,100%{transform:translate(0%,0%) scale(1)}50%{transform:translate(-10%,8%) scale(1.07)}}
    @keyframes bf3{0%,100%{transform:translate(0%,0%) scale(1)}50%{transform:translate(6%,-10%) scale(1.1)}}
    .maskFx .sheen{position:absolute;left:-60%;top:-20%;width:50%;height:160%;transform:rotate(20deg);background:linear-gradient(90deg,rgba(255,255,255,0),rgba(255,255,255,.22),rgba(255,255,255,0));opacity:.10;animation:sheenMove 2.4s ease-in-out infinite;}
    @keyframes sheenMove{0%{transform:translateX(0) rotate(20deg)}100%{transform:translateX(260%) rotate(20deg)}}
    .resultsMask::before{content:"";position:absolute;inset:-35% 0;background:linear-gradient(180deg,rgba(255,255,255,0) 0%,rgba(255,255,255,.10) 45%,rgba(255,255,255,0) 75%);animation:scan 2.4s linear infinite;opacity:.34;z-index:1;}
    @keyframes scan{0%{transform:translateY(-30%)}100%{transform:translateY(35%)}}
    .maskInner{position:relative;z-index:3;text-align:center;padding:1rem;border-radius:1.1rem;border:1px solid rgba(255,255,255,.14);background:rgba(17,24,39,.56);box-shadow:0 1.6rem 5rem rgba(0,0,0,.58);animation:innerPulse 2.6s ease-in-out infinite;}
    @keyframes innerPulse{0%,100%{transform:translateY(0);filter:brightness(1)}50%{transform:translateY(-2px);filter:brightness(1.06)}}
    .maskTitle{font-weight:1100;letter-spacing:.12em;font-size:clamp(.85rem,1.4vw,1.1rem);color:#fff;}
    .maskSub{margin-top:.35rem;font-weight:900;letter-spacing:.06em;color:rgba(203,213,225,.88);font-size:clamp(.65rem,1vw,.78rem);}
    .uni{display:flex;gap:.42rem;justify-content:center;margin-top:.7rem;}
    .uni span{width:8px;height:8px;border-radius:999px;background:rgba(255,255,255,.75);animation:uni .85s infinite ease-in-out;}
    .uni span:nth-child(2){animation-delay:.10s;opacity:.88;}.uni span:nth-child(3){animation-delay:.20s;opacity:.78;}
    .uni span:nth-child(4){animation-delay:.30s;opacity:.68;}.uni span:nth-child(5){animation-delay:.40s;opacity:.58;}
    @keyframes uni{0%,100%{transform:translateY(0) scale(.98)}50%{transform:translateY(-7px) scale(1.12)}}
    #revealBtn{padding:.25rem .65rem;border-radius:999px;border:1px solid rgba(255,255,255,.15);background:rgba(255,255,255,.07);color:var(--muted);font-size:.7rem;font-weight:900;cursor:pointer;transition:all .14s;white-space:nowrap;}
    #revealBtn.revealed{background:rgba(34,197,94,.18);border-color:rgba(34,197,94,.40);color:#4ade80;}
    #qrLayer{position:fixed;inset:0;background:rgba(0,0,0,.92);display:flex;align-items:center;justify-content:center;z-index:999;opacity:1;transition:opacity .45s ease;}
    #qrLayer.hidden{opacity:0;pointer-events:none;}
    .qrBox{width:min(920px,94vw);border-radius:1.8rem;padding:1.3rem 1.3rem .9rem;background:rgba(17,24,39,.92);border:1px solid var(--line);box-shadow:0 1.5rem 5rem rgba(0,0,0,.75);text-align:center;}
    .qrTitle{margin:0 0 .4rem;font-size:clamp(1rem,2vw,1.4rem);letter-spacing:.10em;font-weight:1000;}
    .qrHint{margin:0 0 .7rem;color:var(--muted);font-size:clamp(.8rem,1.4vw,1rem);}
    #qrcode{display:flex;justify-content:center;margin:.5rem 0;}
    #qrcode canvas{width:520px!important;height:520px!important;border-radius:1.1rem;background:#fff;padding:.65rem;image-rendering:pixelated;}
    @media(max-width:820px){#qrcode canvas{width:min(520px,86vw)!important;height:min(520px,86vw)!important;}}
    #qrCount{color:rgba(203,213,225,.9);font-size:.85rem;margin-top:.3rem;}
    #mediaLayer{position:fixed;inset:0;background:#000;display:flex;align-items:center;justify-content:center;z-index:998;opacity:0;pointer-events:none;transition:opacity .3s ease;}
    #mediaLayer.show{opacity:1;pointer-events:auto;}
    .mediaInner{width:100%;height:100%;position:relative;display:flex;align-items:center;justify-content:center;}
    .mediaEl{max-width:100%;max-height:100%;display:block;}
    .mediaEl.cover{object-fit:cover;width:100%;height:100%;}
    .mediaCaption{position:absolute;bottom:1.2rem;left:50%;transform:translateX(-50%);background:rgba(2,6,23,.82);border:1px solid rgba(255,255,255,.12);backdrop-filter:blur(10px);padding:.5rem 1rem;border-radius:999px;font-size:clamp(.8rem,1.5vw,1rem);font-weight:900;white-space:nowrap;max-width:88vw;overflow:hidden;text-overflow:ellipsis;}
    #toast{position:fixed;left:50%;top:1rem;transform:translateX(-50%);background:rgba(17,24,39,.92);border:1px solid rgba(255,255,255,.12);padding:.6rem .9rem;border-radius:999px;color:#f9fafb;font-weight:1000;letter-spacing:.06em;z-index:1200;opacity:0;pointer-events:none;transition:opacity .25s ease;box-shadow:var(--shadow);}
    /* ===== 文字サイズ調整パネル ===== */
    #szPanel{
      position:fixed; right:1rem; top:4rem; z-index:1300;
      width:260px;
      background:rgba(10,14,30,.96); border:1px solid rgba(255,255,255,.14);
      border-radius:1.1rem; box-shadow:0 1.2rem 4rem rgba(0,0,0,.7);
      backdrop-filter:blur(12px);
      padding:.8rem .9rem;
      display:none;
    }
    #szPanel.show{display:block;}
    .szHead{display:flex;justify-content:space-between;align-items:center;margin-bottom:.7rem;}
    .szTitle{font-weight:1000;font-size:.82rem;letter-spacing:.06em;}
    .szClose{background:transparent;border:none;color:var(--muted);cursor:pointer;font-size:1rem;padding:0;}
    .szRow{margin-bottom:.65rem;}
    .szLabel{font-size:.72rem;color:var(--muted);font-weight:900;letter-spacing:.06em;margin-bottom:.3rem;display:flex;justify-content:space-between;}
    .szSlider{width:100%;accent-color:#0a84ff;cursor:pointer;}
    .szActions{display:flex;gap:.5rem;margin-top:.8rem;}
    .szBtn{
      flex:1;padding:.35rem .5rem;border-radius:.6rem;font-size:.72rem;font-weight:900;
      border:1px solid rgba(255,255,255,.15);background:rgba(255,255,255,.08);
      color:var(--muted);cursor:pointer;
    }
    .szBtn:hover{background:rgba(255,255,255,.15);}
    #buildTag{position:fixed;right:.6rem;bottom:.6rem;opacity:.42;font-size:.64rem;z-index:60;background:rgba(0,0,0,.40);border:1px solid rgba(255,255,255,.07);padding:.28rem .52rem;border-radius:999px;backdrop-filter:blur(8px);pointer-events:none;}
  </style>
</head>
<body>
  <button id="themeBtn">☀️ 明るい表示</button>
  <div id="buildTag">build: 2026-03-01 / exp-display-v2 / display</div>
  <div id="toast">解答終了 → 公開</div>

  <!-- 文字サイズ調整パネル -->
  <div id="szPanel">
    <div class="szHead">
      <div class="szTitle">⚙ 文字サイズ調整</div>
      <button class="szClose" id="szClose">✕</button>
    </div>
    <div class="szRow">
      <div class="szLabel"><span>問題文</span><span id="szQVal">—</span></div>
      <input type="range" class="szSlider" id="szQ" min="1.0" max="5.0" step="0.1" value="2.8">
    </div>
    <div class="szRow">
      <div class="szLabel"><span>選択肢</span><span id="szCVal">—</span></div>
      <input type="range" class="szSlider" id="szC" min="0.8" max="3.5" step="0.1" value="1.5">
    </div>
    <div class="szRow">
      <div class="szLabel"><span>テキスト回答</span><span id="szTVal">—</span></div>
      <input type="range" class="szSlider" id="szT" min="0.8" max="3.0" step="0.1" value="1.1">
    </div>
    <div class="szActions">
      <button class="szBtn" id="szSave">💾 保存</button>
      <button class="szBtn" id="szReset">↩ リセット</button>
    </div>
  </div>
  <div id="qrLayer">
    <div class="qrBox">
      <div class="qrTitle">参加用QRコード</div>
      <div class="qrHint">スマホで読み取って参加（v2）</div>
      <div id="qrcode"></div>
      <div id="qrCount">参加中 0人</div>
    </div>
  </div>
  <div id="mediaLayer"><div class="mediaInner" id="mediaInner"></div></div>
  <div class="wrap">
    <div class="topbar">
      <div class="room" id="roomLabel">ROOM —</div>
      <div class="meta">
        <span class="pill" id="phaseLabel">phase: —</span>
        <span class="pill" id="statusLabel">status: —</span>
        <span class="pill" id="countLabel">参加中 0人</span>
        <span id="timerLabel" style="font-weight:1000;font-size:.78rem;color:var(--muted);white-space:nowrap;">⏱ --:--</span>
        <div id="timerBarWrap"><div id="timerBar"></div></div>
        <button class="sBtn" id="soundBtn">🔈 音OFF（タップでON）</button>
        <button class="sBtn" id="ttsBtn">🗣 読み上げOFF</button>
        <button class="sBtn" id="ttsSpeakBtn">🔘 今すぐ読む</button>
        <button id="revealBtn">📊 集計を表示</button>
        <button class="sBtn" id="szBtn">⚙ 文字サイズ</button>
      </div>
    </div>
    <div class="stage">
      <section class="panel left" id="leftPanel">
        <div id="answerBox"><p id="answerLine"></p><p id="explanationLine"></p></div>
        <div id="qEl" class="q">起動中…</div>
        <div id="choicesEl" class="choices" style="display:none;"></div>
      </section>
      <section class="panel right">
        <div class="rtitle" id="rightTitle">集計</div>
        <div id="vchartWrap">
          <button id="idToggleBtn" class="idToggleBtn">👤 ID 表示</button>
          <div id="vchart"></div>
          <div id="resultsMask" class="resultsMask">
            <div class="maskFx"><span class="blob b1"></span><span class="blob b2"></span><span class="blob b3"></span><span class="sheen"></span></div>
            <div class="maskInner">
              <div class="maskTitle">投票中…</div>
              <div class="maskSub">「集計を表示」または「解答終了」で公開</div>

    const firebaseConfig = {
      apiKey: "AIzaSyBke-wTU16skpbK8z80ddK04tE154dHERQ",
      authDomain: "satosan-41eac.firebaseapp.com",

    const app = initializeApp(firebaseConfig);

    const url  = new URL(location.href);

    // ===== SOUND（mp3） =====
    const seObj = {};
    [["start",0.85],["poyon",0.6],["gong",0.8],["countdown",0.7]].forEach(([k,v])=>{
      const a = new Audio(`./${k}.mp3`); a.preload="auto"; a.volume=v; seObj[k]=a;
    });
    let soundEnabled=false, soundUnlocked=false, lastAnswerTotal=0;

    async function unlockSound(){
      if(soundUnlocked) return true;
      try{
        await seObj.poyon.play(); seObj.poyon.pause(); seObj.poyon.currentTime=0;
        soundUnlocked=true; soundEnabled=true;
        soundBtn.classList.add("on"); soundBtn.textContent="🔊 音ON"; return true;
      }catch(e){ soundEnabled=false; soundBtn.classList.remove("on"); soundBtn.textContent="🔈 音OFF（タップでON）"; return false; }
    }
    soundBtn.onclick=()=>unlockSound();
    (()=>{
      const h=async()=>{await unlockSound();window.removeEventListener("pointerdown",h,true);window.removeEventListener("keydown",h,true);};
      window.addEventListener("pointerdown",h,true); window.addEventListener("keydown",h,true);
    })();
    function playSE(key){
      if(!soundEnabled||!soundUnlocked) return;
      try{const a=seObj[key];if(a){a.currentTime=0;a.play().catch(()=>{});}}catch(_){}
    }

    // ===== TTS =====
    let ttsEnabled=false, ttsUnlocked=false, ttsSpeaking=false, ttsRunId=0;
    let ttsAutoKey=null, ttsClosedKey="", ttsOpenTimer=null;
    const OPEN_DELAY=1200;

    const waitMs=ms=>new Promise(r=>setTimeout(r,ms));
    function stopTTS(){
      ttsRunId++;
      if(ttsOpenTimer){clearTimeout(ttsOpenTimer);ttsOpenTimer=null;}
      try{window.speechSynthesis.cancel();}catch(_){}
      ttsSpeaking=false;
    }
    function speakLabelJa(k){
      return {O:"まる",X:"ばつ",A:"エー",B:"ビー",C:"シー",D:"ディー",E:"イー"}[String(k).toUpperCase()]||k;
    }
    function speakOnce(text,runId){
      return new Promise(r=>{
        if(!text||runId!==ttsRunId) return r();
        const u=new SpeechSynthesisUtterance(text);
        u.lang="ja-JP"; u.rate=1.0; u.pitch=1.0; u.onend=()=>r(); u.onerror=()=>r();
        if(runId!==ttsRunId) return r();
        try{window.speechSynthesis.speak(u);}catch(_){r();}
      });
    }
    async function speakCurrent(){
      if(!ttsEnabled||!ttsUnlocked||ttsSpeaking||!currentQuestion) return;
      const q=currentQuestion.question||"";
      const ch=currentQuestion.choices||{};
      const cfg=currentConfig||{};
      const keys=(cfg.choices?.length)?cfg.choices:(currentMode==="ox"?["O","X"]:currentMode==="five"?["A","B","C","D","E"]:[]);
      stopTTS(); const myRun=ttsRunId; ttsSpeaking=true;
      try{
        await waitMs(60); if(myRun!==ttsRunId) return;
        await speakOnce(`問題。${q}`,myRun); if(myRun!==ttsRunId) return;
        if(keys.length){
          await waitMs(400); if(myRun!==ttsRunId) return;
          for(const k of keys){
            const key=String(k).toUpperCase(); const txt=ch[key]||ch[key.toLowerCase()]||"";
            await speakOnce(txt?`${speakLabelJa(key)}、${txt}`:`${speakLabelJa(key)}`,myRun);
            if(myRun!==ttsRunId) return;
            await waitMs(200); if(myRun!==ttsRunId) return;
          }
        }
      }finally{if(myRun===ttsRunId) ttsSpeaking=false;}
    }
    async function speakClosed(){
      if(!ttsEnabled||!ttsUnlocked||!currentQuestion) return;
      const key=`${currentQid||""}::closed`;
      if(ttsClosedKey===key) return; ttsClosedKey=key;
      const ans=currentQuestion.answer?String(currentQuestion.answer).trim().toUpperCase():null;
      if(!ans) return;
      const ch=currentQuestion.choices||{};
      const txt=ch[ans]||ch[ans.toLowerCase()]||"";
      const ex=currentQuestion.explanation||"";
      stopTTS(); const myRun=ttsRunId;
      await waitMs(2000); if(myRun!==ttsRunId) return;
      await speakOnce(txt?`正解は、${speakLabelJa(ans)}。${txt}。`:`正解は、${speakLabelJa(ans)}。`,myRun);
      if(myRun!==ttsRunId) return;
      if(ex) await speakOnce(`解説。${ex}`,myRun);
    }
    function maybeAutoSpeak(){
      if(!ttsEnabled||!ttsUnlocked||currentStatus!=="open"||!currentQuestion) return;
      const k=(currentQid||"")+":open"; if(ttsAutoKey===k) return;
      if(ttsOpenTimer) clearTimeout(ttsOpenTimer);
      ttsOpenTimer=setTimeout(()=>{
        ttsOpenTimer=null; if(currentStatus!=="open") return;
        ttsAutoKey=k; speakCurrent();
      },OPEN_DELAY);
    }
    ttsBtn.onclick=async()=>{
      if(ttsEnabled){
        ttsEnabled=false; ttsBtn.classList.remove("on"); ttsBtn.textContent="🗣 読み上げOFF"; stopTTS();
      }else{
        ttsEnabled=true; ttsUnlocked=true; ttsAutoKey=null; ttsClosedKey="";
        ttsBtn.classList.add("on"); ttsBtn.textContent="🗣 読み上げON";
        await unlockSound(); maybeAutoSpeak();
      }
    };
    ttsSpeakBtn.onclick=async()=>{
      ttsEnabled=true; ttsUnlocked=true;
      ttsBtn.classList.add("on"); ttsBtn.textContent="🗣 読み上げON";
      await unlockSound(); ttsAutoKey=null; stopTTS(); speakCurrent();
    };

    // ===== 文字サイズ調整パネル =====
    const LS_SZ = "cls_disp_sz_v2";
    const SZ_DEFAULT = { q:2.8, choice:1.5, text:1.1 };

    function loadSzSettings(){
      try{
        const raw = localStorage.getItem(LS_SZ);
        return raw ? JSON.parse(raw) : {...SZ_DEFAULT};
      }catch(e){ return {...SZ_DEFAULT}; }
    }
    function saveSzSettings(sz){
      try{ localStorage.setItem(LS_SZ, JSON.stringify(sz)); }catch(e){}
    }
    function applySzSettings(sz){
      const root = document.documentElement.style;
      root.setProperty("--sz-q",      sz.q      + "rem");
      root.setProperty("--sz-choice", sz.choice + "rem");
      root.setProperty("--sz-text",   sz.text   + "rem");
    }
    function syncSliders(sz){
      const qSlider = document.getElementById("szQ");
      const cSlider = document.getElementById("szC");
      const tSlider = document.getElementById("szT");
      if(qSlider){ qSlider.value = sz.q;      document.getElementById("szQVal").textContent = sz.q+"rem"; }
      if(cSlider){ cSlider.value = sz.choice;  document.getElementById("szCVal").textContent = sz.choice+"rem"; }
      if(tSlider){ tSlider.value = sz.text;    document.getElementById("szTVal").textContent = sz.text+"rem"; }
    }

    // 起動時に設定を読み込み適用
    const _sz = loadSzSettings();
    applySzSettings(_sz);

    // パネル操作
    const szPanel = document.getElementById("szPanel");
    document.getElementById("szBtn").onclick = ()=>{
      szPanel.classList.toggle("show");
      if(szPanel.classList.contains("show")) syncSliders(loadSzSettings());
    };
    document.getElementById("szClose").onclick = ()=> szPanel.classList.remove("show");

    ["szQ","szC","szT"].forEach(id=>{
      const el = document.getElementById(id);
      if(!el) return;
      el.oninput = ()=>{
        const sz = loadSzSettings();
        if(id==="szQ")      { sz.q      = parseFloat(el.value); document.getElementById("szQVal").textContent = sz.q+"rem"; }
        if(id==="szC")      { sz.choice = parseFloat(el.value); document.getElementById("szCVal").textContent = sz.choice+"rem"; }
        if(id==="szT")      { sz.text   = parseFloat(el.value); document.getElementById("szTVal").textContent = sz.text+"rem"; }
        applySzSettings(sz);
        saveSzSettings(sz); // スライダー操作でリアルタイム保存
      };
    });
    document.getElementById("szSave").onclick = ()=>{
      const sz = {
        q:      parseFloat(document.getElementById("szQ").value),
        choice: parseFloat(document.getElementById("szC").value),
        text:   parseFloat(document.getElementById("szT").value),
      };
      applySzSettings(sz); saveSzSettings(sz);
      szPanel.classList.remove("show");
    };
    document.getElementById("szReset").onclick = ()=>{
      applySzSettings(SZ_DEFAULT); saveSzSettings(SZ_DEFAULT); syncSliders(SZ_DEFAULT);
    };

    // ===== TOAST =====
    function showToast(msg="解答終了 → 公開"){
      toast.textContent=msg; toast.style.opacity="1";
      setTimeout(()=>toast.style.opacity="0",1400);
    }

    // ===== QR =====
    let currentSession="";
    function buildStudentUrl(session){
      const base=`https://qzp04374-code.github.io/quiz-app/exp-display-v2/student.html?room=${encodeURIComponent(room)}`;
      return session?`${base}&s=${encodeURIComponent(session)}`:base;
    }
    function safeDrawQR(){
      try{
        if(!qrDiv) return; qrDiv.innerHTML="";
        if(!window.QRCode){qrDiv.innerHTML=`<div style="color:#fca5a5;font-weight:900;">QRライブラリ未読込</div>`;return;}
        new window.QRCode(qrDiv,{text:buildStudentUrl(currentSession),width:520,height:520});
      }catch(e){qrDiv.innerHTML=`<div style="color:#fca5a5;">QR生成失敗</div>`;}
    }
    safeDrawQR(); window.addEventListener("load",safeDrawQR);

    let isQR=true;
    function showQR(){isQR=true;qrLayer.classList.remove("hidden");}
    function hideQR(){isQR=false;qrLayer.classList.add("hidden");}

    // ===== TIMER =====
    let timerState=null, timerInterval=null, lastAutoClosedAt=0, countdownPlayed=false;
    const fmt2=n=>String(n).padStart(2,"0");
    function fmtRemain(ms){const s=Math.max(0,Math.ceil(ms/1000)),m=Math.floor(s/60),r=s%60;return `${fmt2(m)}:${fmt2(r)}`;}
    function stopTimerTick(){
      if(timerInterval){clearInterval(timerInterval);timerInterval=null;}
      timerLabel.textContent="⏱ --:--"; timerBar.style.width="0%";
      document.body.classList.remove("timer-running","timer-urgent"); countdownPlayed=false;
    }
    function ensureTimerTick(){
      if(timerInterval) return;
      timerInterval=setInterval(async()=>{
        if(!timerState?.running||!timerState?.endsAt) return;
        const remain=timerState.endsAt-Date.now();
        timerLabel.textContent=`⏱ ${fmtRemain(remain)}`;
        if(timerState.durationSec){
          const ratio=Math.max(0,Math.min(1,remain/(timerState.durationSec*1000)));
          timerBar.style.width=`${Math.round(ratio*100)}%`;
          document.body.classList.toggle("timer-urgent",remain<=10000&&remain>0);
        }
        if(timerState.autoClose&&currentStatus==="open"&&!isQR){
          if(remain<=3000&&remain>0&&!countdownPlayed){playSE("countdown");countdownPlayed=true;}
          if(remain>3000) countdownPlayed=false;
          if(remain<=0){const now=Date.now();if(now-lastAutoClosedAt>1500){lastAutoClosedAt=now;
            // status と phase を同時に書く（closeAccept 相当）
            Promise.all([
              update(activityRef,{status:"closed"}),
              update(ref(db,`rooms/${room}/quiz/present/phase`),"explain")
            ]).catch(()=>{});
          }}
        }
      },250);
    }

    // ===== REVEAL =====
    let manualRevealed=false;
    revealBtn.onclick=()=>{
      manualRevealed=!manualRevealed;
      revealBtn.classList.toggle("revealed",manualRevealed);
      revealBtn.textContent=manualRevealed?"📊 集計を隠す":"📊 集計を表示";
      // Firebase にも書き込む（activity監視の上書きで消えないように）
      update(ref(db,`rooms/${room}/activity`),{revealMode:manualRevealed?"live":"closed"}).catch(()=>{});
      syncRevealUI();
    };
    function shouldHideResults(){
      // explain フェーズ → 必ず表示
      if(currentPhase==="explain") return false;
      // index から「グラフ表示」指示 → 表示
      if(manualRevealed) return false;
      // question / open 中は隠す
      return currentPhase==="question";
    }
    function syncRevealUI(){
      const hide=shouldHideResults();
      resultsMask.classList.toggle("show",hide);
      rightTitle.textContent=hide?"集計（非公開）":"集計";
    }

    // ===== STATE =====
    let currentStatus="-", lastStatus=null;
    let currentMode=null, currentConfig={}, currentPhase="qr", currentView="";
    let currentQuestion=null, currentQid=null;
    let latestQid=null, subscribedQid=null, unsubQ=null;
    let lastAnswers={};
    let rosterCache={};

    // ===== HELPERS =====
    function uiLabel(k){return {O:"○",X:"✕"}[String(k).toUpperCase()]||k;}
    function colorOf(lab){
      const css=getComputedStyle(document.documentElement);
      const m={O:"--color-o",X:"--color-x",A:"--color-a",B:"--color-b",C:"--color-c",D:"--color-d",E:"--color-e"};
      return css.getPropertyValue(m[String(lab).toUpperCase()]||"").trim()||"#94a3b8";
    }
    function normalizeAnswers(ans){
      const out={};
      Object.entries(ans||{}).forEach(([uid,v])=>{
        if(v==null) return;
        if(typeof v==="string") out[uid]=v.trim().toUpperCase();
        else if(typeof v==="object"&&v.value!=null) out[uid]=String(v.value).trim().toUpperCase();
      });
      return out;
    }

    function renderChoices(choicesObj,correctKey,showCorrect){
      choicesEl.innerHTML="";
      const entries=Object.entries(choicesObj||{});
      if(!entries.length){choicesEl.style.display="none";return;}
      choicesEl.style.display="grid";
      entries.forEach(([k,v])=>{
        const key=String(k).trim().toUpperCase();
        const row=document.createElement("div"); row.className="choice";
        if(showCorrect&&correctKey&&key===correctKey) row.classList.add("correct");
        const b=document.createElement("div"); b.className=`badge ${key}`; b.textContent=uiLabel(key);
        const t=document.createElement("div"); t.textContent=v;
        row.appendChild(b); row.appendChild(t); choicesEl.appendChild(row);
      });
    }

    function updateAnswerUI(){
      const q=currentQuestion;
      // 解答解説は phase==="explain" のときだけ表示
      // status==="closed" だけでは出さない（次問切替時に一瞬解説が出るバグを防ぐ）
      const show = (currentPhase==="explain") && q && (q.answer||q.explanation);
      if(!show){answerBox.classList.remove("show");answerLine.textContent="";explanationLine.textContent="";return;}
      answerBox.classList.add("show");
      const ans=q.answer?String(q.answer).trim().toUpperCase():"";
      answerLine.textContent=ans?`正解：${uiLabel(ans)}`:"正解：—";
      explanationLine.textContent=q.explanation?`解説：${q.explanation}`:"";
    }

    function renderVChart(counts,order,uidMap){
      vchart.innerHTML="";
      const ord=Array.isArray(order)&&order.length?order:Object.keys(counts||{});
      if(!ord.length){vchart.innerHTML=`<div style="color:var(--muted);">（集計待ち）</div>`;return;}
      const entries=ord.map(k=>[String(k).toUpperCase(),Number((counts||{})[k]||0)]);
      const max=Math.max(...entries.map(([,v])=>v),1);
      const total=entries.reduce((s,[,v])=>s+(Number(v)||0),0)||1;
      entries.forEach(([lab,val])=>{
        // 外枠（バー行＋IDチップ行）
        const wrap=document.createElement("div");
        wrap.style.cssText="display:flex;flex-direction:column;min-height:0;";
        // バー行
        const col=document.createElement("div"); col.className="col";
        const label=document.createElement("div"); label.className="lab"; label.textContent=uiLabel(lab);
        const track=document.createElement("div"); track.className="barTrack";
        const bar=document.createElement("div"); bar.className="bar";
        bar.style.width=`${Math.round((val/max)*100)}%`;
        bar.style.background=colorOf(lab);
        track.appendChild(bar);
        const cnt=document.createElement("div"); cnt.className="count";
        cnt.textContent=`${val}（${Math.round((val/total)*100)}%）`;
        col.appendChild(label); col.appendChild(track); col.appendChild(cnt);
        wrap.appendChild(col);
        // IDチップ行
        const idRow=document.createElement("div");
        idRow.className="idRow"+(idVisible?" show":"");
        const uids=(uidMap&&uidMap[lab])||[];
        uids.forEach(entry=>{
          const chip=document.createElement("span"); chip.className="idChip";
          const emoji=entry.emoji||"📱"; const tag=entry.tag||String(entry.uid||entry).slice(-6);
          const color=entry.color||null;
          if(color) chip.style.borderColor=color+"66";
          chip.innerHTML=`<span>${emoji}</span>${tag}`;
          idRow.appendChild(chip);
        });
        wrap.appendChild(idRow);
        vchart.appendChild(wrap);
      });
    }

    function renderTextAnswers(ans){
      const vchartWrap=document.getElementById("vchartWrap");
      vchart.innerHTML="";
      // 上から表示できるようにレイアウト変更
      if(vchartWrap){vchartWrap.style.overflowY="auto";vchartWrap.style.alignItems="flex-start";}
      vchart.style.cssText="display:flex;flex-direction:column;align-items:stretch;justify-content:flex-start;width:100%;gap:.25rem;padding:.1rem 0;";
      const vals=Object.values(ans||{}).map(v=>{
        if(typeof v==="string") return v;
        if(v&&typeof v==="object"&&v.value!=null) return String(v.value);
        return null;
      }).filter(Boolean);
      const n=vals.length;
      const header=document.createElement("div");
      header.style.cssText="font-weight:1000;color:rgba(203,213,225,.92);margin-bottom:.35rem;font-size:.78rem;flex-shrink:0;";
      header.textContent=`文字回答 ${n}件${currentPhase==="explain"?"":" （解答終了で一覧公開）"}`;
      vchart.appendChild(header);
      if(currentPhase==="explain"){
        if(vals.length){
          // uid付きで保持して IDチップを付ける
          const ansEntries=Object.entries(ans||{}).map(([uid,v])=>{
            let txt=null;
            if(typeof v==="string") txt=v;
            else if(v&&typeof v==="object"&&v.value!=null) txt=String(v.value);
            return txt!=null?{uid,txt}:null;
          }).filter(Boolean);
          ansEntries.forEach(({uid,txt},i)=>{
            const div=document.createElement("div");
            div.style.cssText="padding:.22rem .35rem;border-bottom:1px solid rgba(255,255,255,.07);font-size:var(--sz-text);line-height:1.45;word-break:break-word;";
            const r=rosterCache[uid]||{};
            const emoji=r.emoji||""; const tag=r.tag||""; const color=r.color||"rgba(255,255,255,0.2)";
            const chipHtml=(emoji||tag)?`<span class="textIdChip" style="border-color:${color}66;display:${idVisible?"":"none"}">${emoji?`<span>${emoji}</span>`:""}${tag}</span>`:"";
            div.innerHTML=`${i+1}. ${txt.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;")}${chipHtml}`;
            vchart.appendChild(div);
          });
        }else{
          const empty=document.createElement("div");
          empty.style.cssText="color:var(--muted);font-size:.8rem;";
          empty.textContent="（回答なし）";
          vchart.appendChild(empty);
        }
      }
    }

    function resetVchartLayout(){
      const vchartWrap=document.getElementById("vchartWrap");
      if(vchartWrap){vchartWrap.style.overflowY="";vchartWrap.style.alignItems="";}
      vchart.style.cssText="";
    }

    function recomputeAndRender(ans){
      const normalized=normalizeAnswers(ans);
      const n=Object.keys(normalized).length;
      countLabel.textContent=`参加中 ${n}人`; qrCount.textContent=`参加中 ${n}人`;
      // テキストモード
      if(currentMode==="text"){
        renderTextAnswers(ans);
        return;
      }
      resetVchartLayout();
      const cfg=currentConfig||{};
      const keys=(cfg.choices?.length)?cfg.choices.map(x=>String(x).toUpperCase())
               :(currentMode==="ox"?["O","X"]:currentMode==="five"?["A","B","C","D","E"]:[]);
      if(!keys.length) return;
      const counts={}; keys.forEach(k=>counts[k]=0);
      const uidMap={}; keys.forEach(k=>uidMap[k]=[]);
      Object.entries(normalized).forEach(([uid,v])=>{
        if(counts[v]!==undefined){
          counts[v]++;
          const r=rosterCache[uid]||{};
          uidMap[v].push({uid,emoji:r.emoji||"📱",tag:r.tag||uid.slice(-6),color:r.color||null});
        }
      });
      renderVChart(counts,keys,uidMap);
    }

    function renderMedia(){
      mediaInner.innerHTML="";
      const m=currentQuestion?.media;
      if(!m?.url){mediaLayer.classList.remove("show");return;}
      const fit=m.objectFit==="cover"?"cover":""; let el;
      if(m.type==="video"){
        el=document.createElement("video"); el.src=m.url; el.controls=true; el.playsInline=true;
        el.muted=!!m.muted; el.loop=!!m.loop;
        if(m.autoplay){el.autoplay=true;el.play().catch(()=>{});}
      }else{el=document.createElement("img");el.src=m.url;el.alt="";}
      el.className=`mediaEl ${fit}`; mediaInner.appendChild(el);
      if(m.caption){const cap=document.createElement("div");cap.className="mediaCaption";cap.textContent=m.caption;mediaInner.appendChild(cap);}
    }

    function applyQuestion(){
      const q=currentQuestion; if(!q) return;
      qEl.textContent=q.question||"";
      // 正解ハイライトは phase==="explain" のときだけ
      const isClosed = (currentPhase==="explain");
      const ans=q.answer?String(q.answer).trim().toUpperCase():null;
      renderChoices(q.choices||{},ans,isClosed);
      updateAnswerUI(); recomputeAndRender(lastAnswers); maybeAutoSpeak();
      if(currentPhase==="media") renderMedia();
      // 新しい問題になったら closed読み上げキーをリセット
      ttsClosedKey="";
    }

    function applyCurrentQid(){
      // quiz / poll 以外は購読を止めて問題をクリア
      if(currentView!=="quiz" && currentView!=="poll"){
        if(unsubQ){unsubQ();unsubQ=null;} subscribedQid=null; currentQid=null;
        currentQuestion=null;
        return;
      }
      const qid=latestQid;
      if(!qid){
        currentQid=null; currentQuestion=null;
        qEl.textContent="（問題を待っています…）"; choicesEl.style.display="none";
        return;
      }
      if(qid===subscribedQid&&unsubQ){
        if(currentQuestion) applyQuestion();
        return;
      }
      if(unsubQ){unsubQ();unsubQ=null;} subscribedQid=qid;
      unsubQ=onValue(qRef(qid),snap=>{
        const q=snap.val();
        if(!q){currentQid=null;currentQuestion=null;qEl.textContent="（問題データなし）";choicesEl.style.display="none";return;}
        currentQid=qid; currentQuestion=q; applyQuestion();
      });
    }

    // ===== PHASE =====
    const mainGrid = document.querySelector(".stage");
    let prevQrFlag=false, prevView="";
    onValue(phaseRef,snap=>{
      currentPhase=snap.val()||"standby";
      phaseLabel.textContent=`phase: ${currentPhase}`;
      if(currentPhase==="qr"){
        showQR();
        if(mainGrid) mainGrid.style.visibility="hidden";
      } else if(currentPhase==="standby"){
        hideQR();
        if(mainGrid) mainGrid.style.visibility="hidden";
      } else if(currentPhase==="media"){
        hideQR();
        if(mainGrid) mainGrid.style.visibility="hidden";
        renderMedia(); mediaLayer.classList.add("show");
      } else {
        // question / explain → メインを見せる
        hideQR();
        mediaLayer.classList.remove("show");
        if(mainGrid) mainGrid.style.visibility="visible";
      }
      // phase="question" に切り替わったら解答解説を強制的に隠す
      if(currentPhase==="question"){
        answerBox.classList.remove("show");
        answerLine.textContent="";
        explanationLine.textContent="";
      }
      // phase="explain" → body.closed を付けて正解アニメーション発動
      // phase="question" → body.closed を外す
      document.body.classList.toggle("closed", currentPhase==="explain");

      // phase="explain" 到着時に gong・toast・正解読み上げ
      if(currentPhase==="explain"){
        playSE("gong"); showToast();
        speakClosed();
      }
      // phase が変わったら必ず問題・解答を再描画
      if(currentQuestion){
        applyQuestion();
      }
      syncRevealUI();
    });

    // ===== ACTIVITY =====
    onValue(activityRef,snap=>{
      const a=snap.val()||{};
      lastStatus=currentStatus;
      currentStatus=(a.status||"-");
      currentMode=(a.mode||"ox").toLowerCase();
      currentConfig=a.config||{};
      currentSession=String(a.session||"");
      currentView=String(a.view||"");
      timerState=a.timer||null;
      if(timerState?.running&&timerState?.endsAt) ensureTimerTick(); else stopTimerTick();
      document.body.classList.toggle("timer-running",!!(timerState?.running&&timerState?.endsAt));
      statusLabel.textContent=`status: ${currentStatus}`;
      // body.closed は phase==="explain" のときだけ（choice.correct アニメーション制御）
      // ※ status==="closed" だと次問切替の瞬間も発火してしまう

      const qrOn=(a.qr===true)||(a.view==="qr");
      const qrChanged=qrOn!==prevQrFlag, viewChanged=currentView!==prevView;
      prevQrFlag=qrOn; prevView=currentView;
      if(qrOn){safeDrawQR();showQR();if(mainGrid)mainGrid.style.visibility="hidden";}
      else if(qrChanged||viewChanged){
        hideQR();
        // view="quiz" or "poll" → mainGrid を見せる
        const showMain = (currentView==="quiz"||currentView==="poll");
        if(mainGrid) mainGrid.style.visibility = showMain ? "visible" : "hidden";
      }

      // revealMode を index から同期（"live"=表示, "closed"=非公開）
      const rm = a.revealMode || "closed";
      manualRevealed = (rm === "live");
      revealBtn.classList.toggle("revealed", manualRevealed);
      revealBtn.textContent = manualRevealed ? "📊 集計を隠す" : "📊 集計を表示";

      // open → 出題音 + 自動読み上げ
      if(lastStatus!=="open"&&currentStatus==="open"){
        playSE("start"); ttsAutoKey=null; maybeAutoSpeak();
      }
      // closed になっても音・読み上げはまだ鳴らさない
      // → phase="explain" 到着時（phase監視側）で鳴らす
      recomputeAndRender(lastAnswers); syncRevealUI(); applyCurrentQid();
    });

    // ===== QID =====
    onValue(qidRef,snap=>{latestQid=snap.val()||null;applyCurrentQid();});

    // ===== THEME TOGGLE =====
    const themeBtn=document.getElementById("themeBtn");
    let isLight=false;
    if(themeBtn){
      themeBtn.addEventListener("click",()=>{
        isLight=!isLight;
        document.body.classList.toggle("light-mode",isLight);
        themeBtn.textContent=isLight?"🌙 暗い表示":"☀️ 明るい表示";
      });
    }

    // ===== ID TOGGLE =====
    const idToggleBtn=document.getElementById("idToggleBtn");
    let idVisible=false;
    if(idToggleBtn){
      idToggleBtn.addEventListener("click",()=>{
        idVisible=!idVisible;
        idToggleBtn.classList.toggle("on",idVisible);
        idToggleBtn.textContent=idVisible?"👤 ID 非表示":"👤 ID 表示";
        document.querySelectorAll(".idRow").forEach(r=>r.classList.toggle("show",idVisible));
        document.querySelectorAll(".textIdChip").forEach(c=>c.style.display=idVisible?"":"none");
      });
    }

    // ===== ROSTER =====
    onValue(rosterRef,snap=>{
      rosterCache=snap.exists()?(snap.val()||{}):{};
    });

    // ===== ANSWERS =====
    onValue(answersRef,snap=>{
      lastAnswers=snap.val()||{};
      const n=Object.keys(lastAnswers).length;
      if(n>lastAnswerTotal) playSE("poyon");
      lastAnswerTotal=n;
      recomputeAndRender(lastAnswers);
    });
  </script>
</body>
</html>
