<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ClassSync v2 Teacher</title>
  <link rel="icon" href="data:,">

  <style>
    :root{
      --bg:#050608;
      --panel:#111827;
      --panel2:#020617;
      --ink:#f9fafb;
      --muted:#cbd5e1;

      --o:#34c759;
      --x:#ff3b30;
      --a:#0a84ff;
      --b:#30d158;
      --c:#ff9f0a;
      --d:#bf5af2;

      --g:#22c55e;
      --danger:#ef4444;
    }
    body{
      font-family:-apple-system,BlinkMacSystemFont,"Helvetica Neue",sans-serif;
      margin:0;
      min-height:100vh;
      background:var(--bg);
      display:flex;
      justify-content:center;
      padding:2rem 0;
      color:var(--ink);
    }
    .card{
      background:var(--panel);
      border-radius:1.5rem;
      padding:1.4rem 1.2rem 1.6rem;
      max-width:94rem;
      width:100%;
      box-shadow:0 1.2rem 4rem rgba(0,0,0,.65);
      border:1px solid rgba(255,255,255,.06);
      box-sizing:border-box;
    }
    h2{ margin:0 0 1rem 0; text-align:center; letter-spacing:.10em; font-weight:900; }

    .topRow{
      display:flex; justify-content:center; align-items:center;
      gap:.6rem; flex-wrap:wrap; margin-bottom:.8rem;
    }

    select, button{
      border:none; font-size:0.95rem;
      border-radius:999px;
      padding:.7rem 1.1rem;
      box-sizing:border-box;
    }
    select{
      background:var(--panel2);
      color:#e5e7eb;
      border:1px solid rgba(255,255,255,.12);
      outline:none;
      min-width: 12rem;
    }
    button{
      cursor:pointer;
      color:#fff;
      background:rgba(255,255,255,.10);
      border:1px solid rgba(255,255,255,.12);
      box-shadow:0 .8rem 2rem rgba(0,0,0,.35);
      transition:transform .12s ease, filter .12s ease, opacity .12s ease;
      font-weight:900;
      letter-spacing:.04em;
    }
    button:active{ transform:scale(.98); filter:brightness(.98); }
    button:disabled{ opacity:.45; cursor:not-allowed; box-shadow:none; transform:none; }

    .grid{
      display:grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap:.8rem;
      margin-top:1rem;
    }
    @media (max-width: 62rem){ .grid{ grid-template-columns: 1fr; } }

    .group{
      padding:.8rem;
      border-radius:1.1rem;
      background: rgba(255,255,255,.06);
      border: 1px solid rgba(255,255,255,.10);
    }
    .gtitle{
      display:flex; justify-content:space-between; align-items:center;
      color:var(--muted);
      font-weight:900;
      letter-spacing:.08em;
      font-size:.72rem;
      margin:0 0 .6rem .2rem;
      opacity:.9;
    }
    .row{
      display:grid;
      grid-template-columns: repeat(auto-fit, minmax(9rem, 1fr));
      gap:.5rem;
      margin-bottom:.5rem;
    }
    .row:last-child{ margin-bottom:0; }

    .btnBlue{ background:rgba(10,132,255,.92); border-color:rgba(10,132,255,.55); }
    .btnOrange{ background:rgba(255,159,10,.92); border-color:rgba(255,159,10,.55); }
    .btnRed{ background:rgba(255,69,58,.92); border-color:rgba(255,69,58,.55); }
    .btnGreen{ background:linear-gradient(135deg, #22c55e, #16a34a); border-color:rgba(34,197,94,.45); }
    .btnPurple{ background:rgba(191,90,242,.90); border-color:rgba(191,90,242,.55); }
    .btnCyan  { background:rgba(0,199,190,.85); border-color:rgba(0,199,190,.55); }
    .btnAmber { background:rgba(245,158,11,.90); border-color:rgba(245,158,11,.55); }

    .metaPill{
      padding:.5rem .8rem;
      border-radius:999px;
      background: rgba(255,255,255,.10);
      border: 1px solid rgba(255,255,255,.10);
      font-size:.8rem;
      white-space: nowrap;
      font-weight:900;
      opacity:.92;
    }

    .pv{
      margin-top:1rem;
      padding:1rem;
      border-radius:1.2rem;
      background: var(--panel2);
      border:1px solid rgba(255,255,255,.08);
    }
    .pvGrid{
      display:grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap:.8rem;
      margin-top:.7rem;
    }
    @media (max-width: 62rem){ .pvGrid{ grid-template-columns: 1fr; } }
    .pvCard{
      background: rgba(255,255,255,.03);
      border: 1px solid rgba(255,255,255,.08);
      border-radius: 1.1rem;
      padding: .9rem;
    }
    .pvHead{
      display:flex; align-items:center; justify-content:space-between;
      margin-bottom:.5rem;
    }
    .badge{
      font-weight:1000; font-size:.75rem; letter-spacing:.12em;
      padding:.4rem .6rem;
      border-radius:999px;
      background: rgba(6,182,212,.22);
      border: 1px solid rgba(6,182,212,.35);
    }
    .badge.next{
      background: rgba(168,85,247,.22);
      border: 1px solid rgba(168,85,247,.35);
    }
    .pvMeta{ font-size:.78rem; opacity:.78; font-weight:900; }
    .pvAnswer{ margin-top:.6rem; font-weight:900; color:var(--o); }
    .pvExp{ margin-top:.4rem; white-space:pre-wrap; opacity:.92; }

    #buildTag{
      position:fixed; right:.7rem; bottom:.7rem;
      opacity:.60; font-size:.75rem; z-index:60;
      background:rgba(0,0,0,.35);
      border:1px solid rgba(255,255,255,.08);
      padding:.4rem .65rem;
      border-radius:999px;
      backdrop-filter: blur(8px);
    }
  </style>
</head>

<body>
  <div id="buildTag">build: 2026-03-01 / exp-display-v2</div>

  <div class="card">
    <h2>教員画面 v2</h2>

    <div class="topRow">
      ルーム：
      <select id="roomSelect"></select>
      <span id="roomMeta" class="metaPill">—</span>
      <span id="phaseMeta" class="metaPill">phase: —</span>
      <button id="dictEditorBtn" style="font-size:.78rem;padding:.45rem .85rem;background:rgba(0,199,190,.18);border-color:rgba(0,199,190,.35);color:#5ee8e0;">🗣 辞書編集</button>
    </div>

    <div class="grid">
      <!-- ① 出題・回収 -->
      <section class="group">
        <div class="gtitle">① 出題・回収</div>
        <div class="row">
          <button id="prevQuestionBtn">問題戻る ◀</button>
          <button id="nextQuestionBtn" class="btnBlue">次の問題 ▶</button>
        </div>
        <div class="row">
          <button id="openBtn" class="btnGreen">回答開始（open）</button>
          <button id="stopBtn" class="btnOrange">解答終了（closed）</button>
        </div>
        <div class="row">
          <button id="timer30Btn">⏱ 30秒</button>
          <button id="timer60Btn">⏱ 60秒</button>
          <button id="timerStopBtn" class="btnRed">⏹ タイマー停止</button>
        </div>
        <div class="row">
          <button id="revealGraphBtn" class="btnCyan">📊 グラフ表示</button>
        </div>
      </section>

      <!-- ② 表示フェーズ -->
      <section class="group">
        <div class="gtitle">② 表示フェーズ（display切替）</div>
        <div class="row">
          <button id="phaseQrBtn" class="btnPurple">QR</button>
          <button id="phaseMediaBtn" class="btnCyan">MEDIA</button>
        </div>
        <div class="row">
          <button id="phaseQuestionBtn" class="btnBlue">QUESTION</button>
          <button id="phaseExplainBtn" class="btnOrange">EXPLAIN</button>
        </div>
      </section>

      <!-- ③ 参加・投影 -->
      <section class="group">
        <div class="gtitle">③ 参加・投影</div>
        <div class="row">
          <button id="qrToggleBtn" class="btnPurple">QRコードON/OFF</button>
          <button id="projectionBtn" class="btnPurple">display表示</button>
        </div>
        <div class="row">
          <button id="gameProjectionBtn" class="btnGreen">game表示</button>
          <button id="endClassBtn" class="btnRed">授業終了</button>
        </div>
      </section>

      <!-- ④ 投票・管理 -->
      <section class="group">
        <div class="gtitle">④ 投票・管理</div>
        <div class="row">
          <button id="quick2Btn">投票 ○✕</button>
          <button id="quick5Btn">投票 5択</button>
        </div>
        <div class="row">
          <button id="quickTextBtn">投票 TEXT</button>
          <button id="importBtn" class="btnAmber">CSV 投入</button>
        </div>
        <div class="row">
          <button id="mediaEditorBtn" class="btnCyan">🎬 Media Editor</button>
        </div>
      </section>
    </div>

    <!-- プレビュー（現行＋次） -->
    <div class="pv">
      <div style="font-weight:1000; letter-spacing:.06em;">出題プレビュー（現在＋次の1問）</div>
      <div class="pvGrid">
        <section class="pvCard">
          <div class="pvHead">
            <div class="badge">現在</div>
            <div class="pvMeta" id="pvQid">ID: —</div>
          </div>
          <div id="pvQuestion">問題を待っています…</div>
          <div id="pvChoices"></div>
          <div id="pvAnswer" class="pvAnswer"></div>
          <div id="pvExplanation" class="pvExp"></div>
        </section>

        <section class="pvCard">
          <div class="pvHead">
            <div class="badge next">次</div>
            <div class="pvMeta" id="pvQidNext">ID: —</div>
          </div>
          <div id="pvQuestionNext">（次の問題）</div>
          <div id="pvChoicesNext"></div>
          <div id="pvAnswerNext" class="pvAnswer"></div>
          <div id="pvExplanationNext" class="pvExp"></div>
        </section>
      </div>
    </div>
  </div>

  <script type="module">
    // ===== Firebase SDK =====
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
    import {
      getDatabase, ref, onValue, get, set, update, remove
    } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";

    // ★ここをあなたの現行index.htmlの設定に差し替え
    const firebaseConfig = {
      apiKey: "AIzaSyBke-wTU16skpbK8z80ddK04tE154dHERQ",
      databaseURL: "https://satosan-41eac-default-rtdb.asia-southeast1.firebasedatabase.app",
      projectId: "satosan-41eac"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);

    // ===== rooms fixed =====
    const ROOMS = ["kyoto-01","kyoto-02","sendai-01","sendai-02","nagoya-01","nagoya-02"];

    // ===== DOM =====
    const roomSelect = document.getElementById("roomSelect");
    const roomMeta = document.getElementById("roomMeta");
    const phaseMeta = document.getElementById("phaseMeta");

    const prevQuestionBtn = document.getElementById("prevQuestionBtn");
    const nextQuestionBtn = document.getElementById("nextQuestionBtn");
    const openBtn = document.getElementById("openBtn");
    const stopBtn = document.getElementById("stopBtn");

    const phaseQrBtn = document.getElementById("phaseQrBtn");
    const phaseMediaBtn = document.getElementById("phaseMediaBtn");
    const phaseQuestionBtn = document.getElementById("phaseQuestionBtn");
    const phaseExplainBtn = document.getElementById("phaseExplainBtn");

    const qrToggleBtn = document.getElementById("qrToggleBtn");
    const projectionBtn = document.getElementById("projectionBtn");
    const gameProjectionBtn = document.getElementById("gameProjectionBtn");
    const endClassBtn = document.getElementById("endClassBtn");

    const quick2Btn = document.getElementById("quick2Btn");
    const quick5Btn = document.getElementById("quick5Btn");
    const quickTextBtn = document.getElementById("quickTextBtn");
    const importBtn      = document.getElementById("importBtn");
    const mediaEditorBtn = document.getElementById("mediaEditorBtn");
    const timer30Btn     = document.getElementById("timer30Btn");
    const timer60Btn     = document.getElementById("timer60Btn");
    const timerStopBtn   = document.getElementById("timerStopBtn");
    const revealGraphBtn = document.getElementById("revealGraphBtn");

    // preview
    const pvQid = document.getElementById("pvQid");
    const pvQuestion = document.getElementById("pvQuestion");
    const pvChoices = document.getElementById("pvChoices");
    const pvAnswer = document.getElementById("pvAnswer");
    const pvExplanation = document.getElementById("pvExplanation");

    const pvQidNext = document.getElementById("pvQidNext");
    const pvQuestionNext = document.getElementById("pvQuestionNext");
    const pvChoicesNext = document.getElementById("pvChoicesNext");
    const pvAnswerNext = document.getElementById("pvAnswerNext");
    const pvExplanationNext = document.getElementById("pvExplanationNext");

    // ===== refs =====
    const activityRef = (room) => ref(db, `rooms/${room}/activity`);
    const answersRef  = (room) => ref(db, `rooms/${room}/answers`);
    const qidRef      = (room) => ref(db, `rooms/${room}/quiz/current_question_id`);
    const questionRef = (room, qid) => ref(db, `rooms/${room}/questions/${qid}`);
    const presentPhaseRef = (room) => ref(db, `rooms/${room}/quiz/present/phase`);

    // ===== グラフ表示切替（revealMode）- attachRoom より前に宣言必須 =====
    let graphRevealed = false;
    function updateRevealBtn(){
      if(!revealGraphBtn) return;
      revealGraphBtn.textContent = graphRevealed ? "📊 グラフ隠す" : "📊 グラフ表示";
      revealGraphBtn.className = graphRevealed ? "btnGreen" : "btnCyan";
    }
    async function toggleRevealGraph(){
      graphRevealed = !graphRevealed;
      await update(activityRef(state.room), {
        revealMode: graphRevealed ? "live" : "closed"
      });
      updateRevealBtn();
    }

    // ===== state =====
    const state = {
      room: null,
      activity: {},
      qid: null,
      question: null,
      nextQid: null,
      nextQuestion: null,
      phase: "qr",
      unsubA: null,
      unsubQid: null,
      unsubQ: null,
      unsubQnext: null,
      unsubPhase: null,
    };

    // ===== utils =====
    function guessMode(q){
      const m = String(q?.mode || "").toLowerCase();
      if (m === "ox" || m === "five" || m === "text") return m;
      const choices = q?.choices;
      if (!choices) return "ox";
      const keys = Object.keys(choices).map(x=>String(x).trim().toUpperCase());
      if (keys.length === 2) return "ox";
      if (keys.length >= 4) return "five";
      return "ox";
    }

    function buildConfigFromMode(mode){
      if (mode === "text") return { type:"text" };
      if (mode === "ox") return { choices:["O","X"] };
      return { choices:["A","B","C","D","E"] };
    }

    function renderChoicesTo(el, q){
      el.innerHTML = "";
      const c = q?.choices;
      if (!c || typeof c !== "object") return;
      const keys = Object.keys(c);
      if (!keys.length) return;
      const ul = document.createElement("ul");
      ul.style.margin = ".4rem 0 0 1.1rem";
      ul.style.opacity = ".92";
      keys.forEach(k=>{
        const li = document.createElement("li");
        li.textContent = `${k}: ${c[k]}`;
        ul.appendChild(li);
      });
      el.appendChild(ul);
    }

    // ===== attach room =====
    function attachRoom(room){
      state.room = room;
      roomSelect.value = room;

      // unsubscribe
      ["unsubA","unsubQid","unsubQ","unsubQnext","unsubPhase"].forEach(k=>{
        if (state[k]){ state[k](); state[k]=null; }
      });

      state.activity = {};
      state.qid = null;
      state.question = null;
      state.nextQid = null;
      state.nextQuestion = null;
      graphRevealed = false; updateRevealBtn();

      state.unsubA = onValue(activityRef(room), snap=>{
        state.activity = snap.val() || {};
        const s = state.activity?.session ? String(state.activity.session) : "";
        const st = state.activity?.status || "-";
        const view = state.activity?.view || "quiz";
        roomMeta.textContent = `status:${st} / view:${view} / session:${s ? s.slice(0,6) : "-"}`;
        renderPreview();
      });

      state.unsubPhase = onValue(presentPhaseRef(room), snap=>{
        state.phase = snap.val() || "qr";
        phaseMeta.textContent = `phase: ${state.phase}`;
      });

      state.unsubQid = onValue(qidRef(room), snap=>{
        state.qid = snap.val() || null;
        updateNextSubscription();
        subscribeQuestion(state.qid);
      });

      updateNextSubscription();
      subscribeQuestion(state.qid);
      renderPreview();
    }

    function subscribeQuestion(qid){
      if (state.unsubQ){ state.unsubQ(); state.unsubQ = null; }
      if (!qid) { state.question = null; renderPreview(); return; }
      state.unsubQ = onValue(questionRef(state.room, qid), snap=>{
        state.question = snap.val() || null;
        renderPreview();
      });
    }

    function updateNextSubscription(){
      const q = state.qid;
      if (!q){ state.nextQid = null; state.nextQuestion = null; renderPreview(); return; }
      const m = String(q).match(/^Q(\d+)(.*)$/i);
      if (!m){ state.nextQid = null; state.nextQuestion = null; renderPreview(); return; }
      const n = Number(m[1]);
      const suffix = m[2] || "";
      const next = `Q${String(n+1).padStart(2,"0")}${suffix}`;
      state.nextQid = next;

      if (state.unsubQnext){ state.unsubQnext(); state.unsubQnext = null; }
      state.unsubQnext = onValue(questionRef(state.room, next), snap=>{
        state.nextQuestion = snap.val() || null;
        renderPreview();
      });
    }

    function renderPreview(){
      const qid = state.qid || "—";
      pvQid.textContent = `ID: ${qid}`;
      pvQuestion.textContent = state.question?.question || "—";
      renderChoicesTo(pvChoices, state.question);
      pvAnswer.textContent = state.question?.answer ? `答え: ${state.question.answer}` : "";
      pvExplanation.textContent = state.question?.explanation ? String(state.question.explanation) : "";

      const nq = state.nextQid || "—";
      pvQidNext.textContent = `ID: ${nq}`;
      pvQuestionNext.textContent = state.nextQuestion?.question || "—";
      renderChoicesTo(pvChoicesNext, state.nextQuestion);
      pvAnswerNext.textContent = state.nextQuestion?.answer ? `答え: ${state.nextQuestion.answer}` : "";
      pvExplanationNext.textContent = state.nextQuestion?.explanation ? String(state.nextQuestion.explanation) : "";
    }

    // ===== core operations =====
    async function ensureSession(){
      const aSnap = await get(activityRef(state.room));
      const aNow = aSnap.val() || {};
      const session = String(aNow.session || "") || Date.now().toString(36);
      if (!aNow.session) await update(activityRef(state.room), { session });
      return session;
    }

    async function clearAnswers(){
      await remove(answersRef(state.room));
    }

    async function goQuestion(qid){
      if (!qid) return;

      const qs = await get(questionRef(state.room, qid));
      const q = qs.val() || {};
      const mode = guessMode(q);
      const config = buildConfigFromMode(mode);
      const session = await ensureSession();

      // まず問題IDを切替
      await set(qidRef(state.room), qid);

      // answersは問題切替で必ずリセット
      await clearAnswers();

      // mediaがあるなら phase=media、なければ phase=question
      const hasMedia = !!(q && q.media && q.media.url);
      const phase = hasMedia ? "media" : "question";

      // 受付は一旦 closed（先生が「回答開始」を押す）
      // activity と revealMode を1回のupdateで書く
      await update(activityRef(state.room), {
        view:"quiz", qr:false, status:"closed",
        mode, config, timer:{ running:false }, session,
        revealMode:"closed"
      });
      await set(presentPhaseRef(state.room), phase);
    }

    async function openAccept(){
      await ensureSession();
      // view:"quiz", qr:false を明示して display側の isQR を確実に解除
      await update(activityRef(state.room), { status:"open", qr:false, view:"quiz", revealMode: state.activity?.revealMode || "closed" });
      await set(presentPhaseRef(state.room), "question");
    }

    async function closeAccept(){
      await update(activityRef(state.room), { status:"closed" });
      await set(presentPhaseRef(state.room), "explain");
    }

    async function setPhase(p){
      await set(presentPhaseRef(state.room), p);
      // phase=qr のときだけ session更新ルール（安全運用）に合わせる
      if (p === "qr"){
        const session = Date.now().toString(36);
        await update(activityRef(state.room), { qr:true, status:"closed", view:"qr", session });
      }
      if (p === "game"){
        await update(activityRef(state.room), { view:"game", status:"closed" });
      }
      if (p === "question"){
        await update(activityRef(state.room), { view:"quiz", qr:false });
      }
      if (p === "media"){
        await update(activityRef(state.room), { view:"quiz", qr:false, status:"closed" });
      }
      if (p === "explain"){
        await update(activityRef(state.room), { status:"closed", view:"quiz" });
      }
    }

    async function toggleQrFlag(){
      const cur = state.activity?.qr === true;
      if (cur){
        // QR OFF: standbyに戻す
        await update(activityRef(state.room), { qr:false, view:"standby", revealMode:"closed" });
        await set(presentPhaseRef(state.room), "standby");
        graphRevealed = false; updateRevealBtn();
      }else{
        // QR ON: session新規発行
        const session = Date.now().toString(36);
        await update(activityRef(state.room), { qr:true, view:"qr", status:"closed", session });
        await set(presentPhaseRef(state.room), "qr");
      }
    }

    async function startQuickPoll(mode){
      await clearAnswers();
      const session = await ensureSession();
      const config = buildConfigFromMode(mode);
      await update(activityRef(state.room), {
        status:"open",
        qr:false,
        view:"poll",
        mode,
        config,
        timer:{ running:false },
        session,
        revealMode:"closed"
      });
      await set(presentPhaseRef(state.room), "question");
    }

    // ===== タイマー =====
    const timerRef = (room) => ref(db, `rooms/${room}/activity/timer`);

    async function startTimer(sec){
      // 「回答開始」後に押す想定（status:"open" のまま）
      const endsAt = Date.now() + sec * 1000;
      await update(activityRef(state.room), {
        timer: { running:true, endsAt, durationSec:sec, autoClose:true }
      });
    }
    async function stopTimer(){
      await update(activityRef(state.room), {
        timer: { running:false }
      });
    }

    // ===== グラフ表示切替（revealMode）→ 宣言は下のstateブロックへ移動 =====

    async function endClass(){
      const ok = confirm("授業を終了します（standbyに戻してanswersも消します）");
      if (!ok) return;
      await clearAnswers();
      await update(activityRef(state.room), { status:"closed", view:"standby", qr:false, revealMode:"closed" });
      await set(presentPhaseRef(state.room), "standby");
    }

    // ===== events =====
    ROOMS.forEach(r=>{
      const opt = document.createElement("option");
      opt.value = r; opt.textContent = r;
      roomSelect.appendChild(opt);
    });

    roomSelect.onchange = () => {
      const r = roomSelect.value;
      localStorage.setItem("cs_v2_teacher_room", r);
      attachRoom(r);
    };

    prevQuestionBtn.onclick = async () => {
      const q = state.qid;
      if (!q) return;
      const m = String(q).match(/^Q(\d+)(.*)$/i);
      if (!m) return;
      const n = Number(m[1]);
      const suffix = m[2] || "";
      const prev = `Q${String(Math.max(1, n-1)).padStart(2,"0")}${suffix}`;
      await goQuestion(prev);
    };

    nextQuestionBtn.onclick = async () => {
      const q = state.qid || "Q00";
      const m = String(q).match(/^Q(\d+)(.*)$/i);
      const n = m ? Number(m[1]) : 0;
      const suffix = m ? (m[2]||"") : "";
      const next = `Q${String(n+1).padStart(2,"0")}${suffix}`;
      await goQuestion(next);
    };

    openBtn.onclick = openAccept;
    stopBtn.onclick = closeAccept;

    phaseQrBtn.onclick = () => setPhase("qr");
    phaseMediaBtn.onclick = () => setPhase("media");
    phaseQuestionBtn.onclick = () => setPhase("question");
    phaseExplainBtn.onclick = () => setPhase("explain");

    qrToggleBtn.onclick = toggleQrFlag;

    projectionBtn.onclick = async () => {
      const r = encodeURIComponent(state.room || "");
      // ポップアップブロック対策：先に window.open（同期コンテキストで呼ぶ）
      const win = window.open(`./display.html?room=${r}`, "_blank");
      if(!win) alert("ポップアップがブロックされました。ブラウザの設定で許可してください。");
      // その後 Firebase にQRを書く
      try{
        const session = Date.now().toString(36);
        await update(activityRef(state.room), { qr:true, view:"qr", status:"closed", session });
        await set(presentPhaseRef(state.room), "qr");
      }catch(e){ console.warn("QR発行失敗:", e); }
    };
    gameProjectionBtn.onclick = () => {
      const r = encodeURIComponent(state.room || "");
      window.open(`./game.html?room=${r}`, "_blank");
      setPhase("game").catch(()=>{});
    };

    quick2Btn.onclick = () => startQuickPoll("ox");
    quick5Btn.onclick = () => startQuickPoll("five");
    quickTextBtn.onclick = () => startQuickPoll("text");

    importBtn.onclick = () => {
      const r = encodeURIComponent(state.room || "");
      window.open(`./import-csv.html?room=${r}`, "_blank");
    };

    mediaEditorBtn.onclick = () => {
      const r = encodeURIComponent(state.room || "");
      window.open(`./media-editor.html?room=${r}`, "_blank");
    };

    timer30Btn.onclick  = () => startTimer(30);
    timer60Btn.onclick  = () => startTimer(60);
    timerStopBtn.onclick= stopTimer;
    revealGraphBtn.onclick = toggleRevealGraph;

    endClassBtn.onclick = endClass;

    // ===== TTS辞書編集（dict-editor.html を開く） =====
    const dictEditorBtn2 = document.getElementById("dictEditorBtn");
    if(dictEditorBtn2){
      dictEditorBtn2.onclick = () => window.open("./dict-editor.html", "_blank");
    }

    // ===== init =====
    const saved = localStorage.getItem("cs_v2_teacher_room");
    attachRoom(saved && ROOMS.includes(saved) ? saved : ROOMS[0]);

  </script>
</body>
</html>
